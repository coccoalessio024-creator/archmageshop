<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Archmage's Legacy</title>
    <link rel="stylesheet" href="legacy-style.css">
</head>
<body>

    <div class="corner-dec top-left"></div>
    <div class="corner-dec bottom-left-dec"></div>

    <button class="save-btn" onclick="window.print()" style="margin: 20px auto; display: block; z-index: 100;">📜 SEAL YOUR LEGACY (SAVE)</button>

    <div class="legacy-container">
        <div class="vault-grid" id="vault-items"></div>

        <div id="bag-and-support">
            <div class="bag-zone" id="drop-zone">
                <div id="satchel-visual-content" style="display: flex; flex-wrap: wrap; justify-content: center; padding: 10px;"></div>
                <p style="color: rgba(212, 175, 55, 0.6); font-size: 12px;">Drop relics here</p>
            </div>
            <div id="failed-tribute-box" style="margin-top: 15px; padding: 10px; border: 1px dashed #8b4513; text-align: center; font-size: 12px;">
                <p>Troubles with tribute? / Problemi col tributo?</p>
                <a href="summon-support.html" style="color: var(--fire); font-weight: bold;">Click here / Clicca qui</a>
            </div>
        </div>

        <div class="final-scroll" id="print-area">
            <div class="scroll-header" style="text-align: center;">
                <div id="final-avatar-frame" style="width:100px; height:100px; margin:auto; overflow:hidden; border:3px solid #8b4513;">
                    <img id="legacy-avatar-img" src="" style="width:100%; height:100%; object-fit:cover; transform:scale(1.35); image-rendering:pixelated;">
                </div>
                <input type="text" placeholder="Enter Name..." id="hero-name" style="font-family:'MedievalSharp'; font-size: 24px; border:none; border-bottom:1px solid #8b4513; background:transparent; width:80%; text-align:center;">
                <div class="stat-line" style="display:flex; justify-content:space-around; margin-top:10px; font-size:12px;">
                    <span id="display-lvl">LVL: --</span>
                    <span id="display-gems">GEMS: -/3</span>
                    <span id="display-gold">TRIBUTE: 0.00 Gold</span>
                </div>
            </div>

            <h3 style="border-bottom: 2px solid #8b4513; margin-top: 20px;">INVENTORY</h3>
            <ul id="recap-list" style="list-style:none; padding:0; font-size:13px;"></ul>
 </div>
                <input type="text" placeholder="notes and greetings  - note e congratulazioni:" style="font-family:'MedievalSharp'; font-size: 24px; border:none; border-bottom:1px solid #8b4513; background:transparent; width:80%; text-align:center;">
                <div class="stat-line" style="display:flex; justify-content:space-around; margin-top:10px; font-size:12px;">
                </div>
            </div>
                    
          <div id="legacy-print-only">
    <p style="text-align: center; font-weight: bold; border-top: 1px solid #8b4513; padding-top: 15px;">
        Your tributes have yielded these relics / I tuoi tributi ti hanno fruttato:
    </p>
    <div id="print-relics-grid" class="print-relics-grid">
        <!-- Verrà popolato dal JS -->
    </div>
</div>

            <div id="final-stats" style="margin-top: 20px; font-weight: bold; border-top: 2px solid #8b4513; padding-top: 10px;">
                ✨ FUN: 0 | 🌟 JOY: 0 | 🟦 MANA: 0
            </div>

            <div id="qr-legacy-frame" style="margin-top:20px; text-align:center;">
                <img src="archives/legacy-qr.jpeg" style="width:60px;">
            </div>
        </div>
    </div>

    <div id="oracle-info" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#050505; border:2px solid var(--gold); padding:10px; color:var(--gold); z-index:10000;"></div>

    <script src="archmage-logic.js"></script>
    <script>
        const legacyDatabase = {
            "blessing.png": { name: "Archmage Blessing", lore: "Resonates with the first Archmage.", fun: 0, joy: 3, mana: 1 },
            "buff.png": { name: "Archmage Buff", lore: "Surge of adrenaline and light.", fun: 3, joy: 2, mana: 1 },
            "coinhead.png": { name: "Toilet Token", lore: "An eternal flip between destiny and necessity.", fun: 3, joy: 2, mana: 1 },
            "hugtoken.png": { name: "Archmage Hug", lore: "Warmth in the winter rain.", fun: 2, joy: 3, mana: 0 },
            "invisibilitybrew.png.png": { name: "Invisibility Brew", lore: "Shadow among the stars.", fun: 1, joy: 0, mana: 3 },
            "magicmirror.png.png": { name: "Magic Mirror", lore: "Reflects your true destiny.", fun: 0, joy: 3, mana: 2 },
            "silentring.png.png": { name: "Silence Ring", lore: "Moonlight forged into silence.", fun: 0, joy: 0, mana: 5 },
            "treasuremap.png.png": { name: "Treasure Map", lore: "The X marks your path.", fun: 3, joy: 0, mana: 2 }
        };

        let totalStats = { fun: 0, joy: 0, mana: 0 };

        window.addEventListener('DOMContentLoaded', () => {
            const lvl = localStorage.getItem('hero_lvl') || 1;
            const idx = localStorage.getItem('hero_avatar_idx') || 0;
            const avatars = ['axeman.png', 'knight.png', 'actualmage.png'];
            const gems = ['trial_1', 'trial_2', 'trial_3'].filter(g => localStorage.getItem(g) === 'true').length;

            document.getElementById('display-lvl').innerText = `LVL: ${lvl}`;
            document.getElementById('display-gems').innerText = `GEMS: ${gems}/3`;
            document.getElementById('legacy-avatar-img').src = `archives/${avatars[idx]}`;

            const cartItems = JSON.parse(localStorage.getItem('magicCart')) || [];
            const goldSpent = cartItems.reduce((total, item) => total + parseFloat(item.price || 0), 0);
            document.getElementById('display-gold').innerText = `TRIBUTE: ${(goldSpent * 1.05).toFixed(2)} Gold`;

            const purchased = JSON.parse(localStorage.getItem('purchased_items')) || [];
            const printGrid = document.getElementById('print-relics-grid');

            Object.keys(legacyDatabase).forEach(file => {
                const dbItem = legacyDatabase[file];
                const isInCart = cartItems.some(item => item.name.toLowerCase().trim() === dbItem.name.toLowerCase().trim());
                
                if (isInCart) {
                    // Aggiungi alla griglia di stampa (PNG + Nome)
                    const pDiv = document.createElement('div');
                    pDiv.className = 'print-relic-item';
                    pDiv.innerHTML = `<img src="archives/${file}"><span>${dbItem.name}</span>`;
                    printGrid.appendChild(pDiv);

                    if (purchased.includes(file)) {
                        renderInSatchel(file);
                    } else {
                        createVaultItem(file);
                    }
                }
            });
        });

        function createVaultItem(file) {
            const slot = document.createElement('div');
            slot.className = 'item-slot'; slot.draggable = true; slot.id = file;
            slot.innerHTML = `<img src="archives/${file}" style="width:50px; pointer-events:none;">`;
            slot.ondragstart = (e) => { e.dataTransfer.setData("text", e.target.id); showOracle(file); };
            document.getElementById('vault-items').appendChild(slot);
        }

        function renderInSatchel(file) {
            const item = legacyDatabase[file];
            const satImg = document.createElement('img');
            satImg.src = `archives/${file}`; satImg.className = 'satchel-item';
            satImg.style.transform = `rotate(${Math.random()*20-10}deg)`;
            document.getElementById('satchel-visual-content').appendChild(satImg);

            const li = document.createElement('li');
            li.innerHTML = `<strong>${item.name}</strong> (+F:${item.fun} +J:${item.joy} +M:${item.mana})`;
            document.getElementById('recap-list').appendChild(li);

            totalStats.fun += item.fun; totalStats.joy += item.joy; totalStats.mana += item.mana;
            document.getElementById('final-stats').innerHTML = `✨ FUN: ${totalStats.fun} | 🌟 JOY: ${totalStats.joy} | 🟦 MANA: ${totalStats.mana}`;
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.getData("text");
            if (legacyDatabase[file]) {
                let purchased = JSON.parse(localStorage.getItem('purchased_items')) || [];
                if (!purchased.includes(file)) { purchased.push(file); localStorage.setItem('purchased_items', JSON.stringify(purchased)); }
                renderInSatchel(file);
                if (document.getElementById(file)) document.getElementById(file).remove();
            }
        };

        function showOracle(file) {
            const o = document.getElementById('oracle-info');
            o.innerHTML = `<strong>${legacyDatabase[file].name}</strong><br><small>${legacyDatabase[file].lore}</small>`;
            o.style.display = 'block';
        }
    </script>
</body>
</html>
