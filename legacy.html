<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Archmage's Legacy</title>
    <!-- Fix Google Fonts: Stesso metodo dell'Index -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="legacy-style.css">
</head>
<body>

    <div class="corner-dec top-left"></div>
    <div class="corner-dec bottom-left-dec"></div>

    <button id="vault-toggle-btn" onclick="toggleVault()">🎒 VAULT</button>
    <div id="vault-container">
        <div class="vault-grid" id="vault-items"></div>
    </div>

    <button class="save-btn" onclick="window.print()">📜 SEAL YOUR LEGACY (SAVE)</button>

    <div class="legacy-container">
        
        <div id="bag-and-support">
            <div class="bag-zone" id="drop-zone" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                <div id="satchel-visual-content"></div>
                <p id="drop-hint">Drop Relics from Vault</p>
            </div>
            
            <div id="failed-tribute-box">
                <p>Troubles? <a href="summon-support.html">Invoke Support</a></p>
            </div>

            <div id="qr-legacy-frame">
                <img src="archives/legacy-qr.jpeg" alt="QR">
                <p>VERIFY LEGACY</p>
            </div>
        </div>

        <div class="final-scroll" id="print-area">
            <div class="scroll-header">
                <div id="final-avatar-frame">
                    <img id="legacy-avatar-img" src="" alt="Hero">
                </div>
                <input type="text" placeholder="Enter Hero Name..." id="hero-name">
                
                <div class="stat-line">
                    <span id="display-lvl">LVL: --</span>
                    <span id="display-gems">GEMS: 0/3</span>
                    <span id="display-gold">TRIBUTE: 0.00 Gold</span>
                </div>
            </div>

            <h3>INVENTORY & CHRONICLES</h3>
            <ul id="recap-list"></ul>

            <textarea placeholder="Notes and Greetings / Note e Congratulazioni..." id="scroll-notes"></textarea>

            <div id="final-stats">
                ✨ FUN: 0 | 🌟 JOY: 0 | 🟦 MANA: 0
            </div>

            <!-- Sezione solo per il PDF -->
            <div id="legacy-print-only">
                <p class="print-title">RELICS ACQUIRED BY TRIBUTE:</p>
                <div id="print-relics-grid" class="print-relics-grid"></div>
            </div>
        </div>
    </div>

    <script src="archmage-logic.js"></script>
    <script>
        const legacyDatabase = {
            "blessing.png": { name: "Archmage Blessing", lore: "A resonance of ancient power.", fun: 0, joy: 3, mana: 1 },
            "buff.png": { name: "Archmage Buff", lore: "Pure light surge through the soul.", fun: 3, joy: 2, mana: 1 },
            "coinhead.png": { name: "Toilet Token", lore: "Eternal flip between destiny and necessity.", fun: 3, joy: 2, mana: 1 },
            "hugtoken.png": { name: "Archmage Hug", lore: "Warmth that defies the winter rain.", fun: 2, joy: 3, mana: 0 },
            "invisibilitybrew.png.png": { name: "Invisibility Brew", lore: "Walk unseen among the stars.", fun: 1, joy: 0, mana: 3 },
            "magicmirror.png.png": { name: "Magic Mirror", lore: "Reflecting the hero's true path.", fun: 0, joy: 3, mana: 2 },
            "silentring.png.png": { name: "Silence Ring", lore: "Silence forged in moonlight.", fun: 0, joy: 0, mana: 5 },
            "treasuremap.png.png": { name: "Treasure Map", lore: "The X marks the heart of the journey.", fun: 3, joy: 0, mana: 2 }
        };

        let totalStats = { fun: 0, joy: 0, mana: 0 };

        function toggleVault() { document.getElementById('vault-container').classList.toggle('open'); }

        window.addEventListener('DOMContentLoaded', () => {
            // Carica Eroe e Livello
            const lvl = localStorage.getItem('hero_lvl') || 1;
            const idx = localStorage.getItem('hero_avatar_idx') || 0;
            const avatars = ['axeman.png', 'knight.png', 'actualmage.png'];
            
            // CONTEGGIO GEMME
            const gemKeys = ['trial_1', 'trial_2', 'trial_3'];
            const collectedGems = gemKeys.filter(key => localStorage.getItem(key) === 'true').length;
            
            document.getElementById('display-lvl').innerText = `LVL: ${lvl}`;
            document.getElementById('display-gems').innerText = `GEMS: ${collectedGems}/3`;
            document.getElementById('legacy-avatar-img').src = `archives/${avatars[idx]}`;

            // MEMORIA CARRELLO (Vault filtra solo oggetti presenti nel cart)
            const cartItems = JSON.parse(localStorage.getItem('magicCart')) || [];
            const goldSpent = cartItems.reduce((total, item) => total + parseFloat(item.price || 0), 0);
            document.getElementById('display-gold').innerText = `TRIBUTE: ${(goldSpent * 1.05).toFixed(2)} Gold`;

            const purchased = JSON.parse(localStorage.getItem('purchased_items')) || [];
            const pGrid = document.getElementById('print-relics-grid');

            Object.keys(legacyDatabase).forEach(file => {
                const dbItem = legacyDatabase[file];
                // Verifica se l'oggetto è nel carrello (basato sul nome)
                const isInCart = cartItems.some(item => item.name.trim().toLowerCase() === dbItem.name.toLowerCase());
                
                if (isInCart) {
                    // Prepara griglia di stampa
                    const pDiv = document.createElement('div');
                    pDiv.className = 'print-relic-item';
                    pDiv.innerHTML = `<img src="archives/${file}"><br><span>${dbItem.name}</span>`;
                    pGrid.appendChild(pDiv);

                    if (purchased.includes(file)) renderInSatchel(file);
                    else createVaultItem(file);
                }
            });
        });

        function createVaultItem(file) {
            const slot = document.createElement('div');
            slot.className = 'item-slot'; slot.draggable = true; slot.id = file;
            slot.innerHTML = `<img src="archives/${file}" style="width:50px; pointer-events:none;">`;
            slot.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
            document.getElementById('vault-items').appendChild(slot);
        }

        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.getData("text");
            if (legacyDatabase[file]) {
                let purchased = JSON.parse(localStorage.getItem('purchased_items')) || [];
                if (!purchased.includes(file)) {
                    purchased.push(file);
                    localStorage.setItem('purchased_items', JSON.stringify(purchased));
                }
                renderInSatchel(file);
                const el = document.getElementById(file); if (el) el.remove();
            }
        }

        function renderInSatchel(file) {
            const item = legacyDatabase[file];
            const satImg = document.createElement('img');
            satImg.src = `archives/${file}`; satImg.className = 'satchel-item';
            document.getElementById('satchel-visual-content').appendChild(satImg);
            
            // AGGIUNTA LORE ALLA PERGAMENA
            const li = document.createElement('li');
            li.innerHTML = `• <strong>${item.name}</strong>: <em>${item.lore}</em>`;
            document.getElementById('recap-list').appendChild(li);

            totalStats.fun += item.fun; totalStats.joy += item.joy; totalStats.mana += item.mana;
            document.getElementById('final-stats').innerHTML = `✨ FUN: ${totalStats.fun} | 🌟 JOY: ${totalStats.joy} | 🟦 MANA: ${totalStats.mana}`;
        }
    </script>
</body>
</html>
