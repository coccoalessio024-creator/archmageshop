<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Chamber</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #0a0a0a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
            color: #f3e5ab;
            font-family: 'MedievalSharp', serif;
        }

        .riddle-box { 
            text-align: center; 
            max-width: 600px; 
            padding: 3rem; 
            border: 2px solid #d4af37; 
            background: rgba(20, 20, 20, 0.95);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
            position: relative;
        }

        input { 
            background: transparent; 
            border: none; 
            border-bottom: 2px solid #d4af37; 
            color: #d4af37; 
            font-family: 'MedievalSharp'; 
            font-size: 1.8rem; 
            text-align: center; 
            outline: none; 
            margin-top: 2rem; 
            width: 90%;
            transition: 0.3s;
        }

        input:focus { border-bottom-color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }

        .error-msg { 
            color: #7a1515; 
            margin-top: 1.5rem; 
            display: none; 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #secret-content { 
            display: none; 
            text-align: center;
            animation: fadeIn 2.5s forwards; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .arch-title { color: #d4af37; font-size: 2.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <!-- Camera dell'Indovinello -->
    <div class="riddle-box" id="chamber">
        <h2 class="arch-title">The Trial of Shadows</h2>
        <p id="riddle-text" style="font-size: 1.2rem; line-height: 1.8;">
            "Sempre corre, ma non ha gambe.<br>
            Ha una bocca, ma non parla mai.<br>
            Ha un letto, ma non dorme mai.<br>
            Cos'è?"
        </p>
        <input type="text" id="answer" placeholder="..." autocomplete="off">
        <p id="error" class="error-msg">L'oscurità ride della tua stoltezza...</p>
    </div>

    <!-- Contenuto Sbloccato -->
    <div id="secret-content">
        <h1 class="arch-title" style="font-size: 4rem;">ADEPT ACCEPTED</h1>
        <p style="font-size: 1.5rem;">"Hai guardato oltre il velo. Il segreto è tuo."</p>
        <div style="margin: 2rem 0; padding: 2rem; border: 1px dashed #d4af37;">
            <p>Master Code: <span style="color: #ffcc00; letter-spacing: 5px;">ARCH-MASTER-777</span></p>
        </div>
        <a href="index.html" class="arch-btn" style="text-decoration: none; display: inline-block;">Return to Sanctum</a>
    </div>

    <script>
        const input = document.getElementById('answer');
        const chamber = document.getElementById('chamber');
        const secret = document.getElementById('secret-content');
        const error = document.getElementById('error');

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = input.value.toLowerCase().trim();
                // Soluzione: fiume
                if (val === 'fiume' || val === 'il fiume') {
                    chamber.style.opacity = '0';
                    setTimeout(() => {
                        chamber.style.display = 'none';
                        secret.style.display = 'block';
                    }, 500);
                } else {
                    error.style.display = 'block';
                    // Effetto scossa all'errore
                    chamber.style.animation = 'shake 0.3s';
                    setTimeout(() => chamber.style.animation = '', 300);
                    input.value = '';
                }
            }
        });
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
