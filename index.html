<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CURSORE E FONT GLOBALE */
        * { 
            cursor: url('archives/potionmini.png'), auto !important; 
            font-family: 'MedievalSharp', serif !important; 
        }

        body { background: #140f0a; color: #f3e5ab; margin: 0; overflow: hidden; height: 100vh; }

        /* LOGO FISSO ANGOLO */
        .brand-logo-fixed {
            position: fixed; bottom: 20px; right: 20px;
            width: 70px; z-index: 1000;
            filter: drop-shadow(0 0 5px #d4af37);
        }

        /* PERGAMENE LATERALI */
        .welcome-scroll {
            position: fixed; top: 0; width: 130px; height: 100%;
            background: #fdf5e6; border: 2px solid #8b4513; 
            z-index: 500; transition: transform 1.5s ease-in-out;
            display: flex; flex-direction: column; align-items: center; padding-top: 2rem;
            color: #3d2b1f; text-align: center;
        }
        .scroll-left { left: 0; transform: translateY(0); }
        .scroll-right { right: 0; transform: translateY(0); }
        .welcome-scroll.rolled { transform: translateY(-100%); }

        /* CORIANDOLI DI SISTEMA (🧪) */
        .potion-particle {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 1500;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 5px #00ff00); /* Bagliore magico verde */
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* CONTENUTO CENTRALE */
        .sanctum-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .archmage-frame {
            width: 240px; height: 240px; border-radius: 50%;
            border: 4px solid #d4af37; overflow: hidden;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
            margin-bottom: 1rem;
        }
        .archmage-frame img { width: 100%; height: 100%; object-fit: cover; }

        .actions-row { display: flex; gap: 15px; margin-top: 1.5rem; justify-content: center; }
    </style>
</head>
<body>

    <!-- PERGAMENE -->
    <div class="welcome-scroll scroll-left" id="s-left">
        <h3 style="color:#7a1515; font-size: 0.9rem;">WELCOME</h3>
        <p>✧<br>Adept<br>of the<br>Arts<br>✧</p>
    </div>
    <div class="welcome-scroll scroll-right" id="s-right">
        <h3 style="color:#7a1515; font-size: 0.9rem;">REJOICE</h3>
        <p>✧<br>The Lore<br>is<br>Open<br>✧</p>
    </div>

    <div class="sanctum-container">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage">
        </div>
        
        <h1 style="font-size: 2.8rem; color: #d4af37; margin: 0;">The Archmage</h1>
        <p style="font-style: italic; max-width: 500px;">"Rejoice in the light of guidance of The Archmage."</p>
        
        <div class="actions-row">
            <a href="emporium/index.html" class="arch-btn">EMPORIUM</a>
            <a href="emporium/bulletins.html" class="arch-btn" style="background: #2a1a0a;">BULLETINS</a>
            <a href="trial.html" class="arch-btn" style="background: #4a0404; border-color: #ffcc00;">THE TRIAL</a>
        </div>
    </div>

    <a href="secret.html" class="brand-logo-fixed">
        <img src="archives/logo_archmage.png" alt="Logo" style="width: 100%;">
    </a>

    <script>
        window.onload = function() {
            // PIOGGIA DI POZIONI DI SISTEMA (🧪)
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.innerHTML = '🧪'; // Icona pozione di sistema
                    p.className = 'potion-particle';
                    p.style.left = (Math.random() * 90) + 'vw';
                    p.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 5000);
                }, i * 400);
            }

            // CHIUSURA PERGAMENE
            setTimeout(() => {
                document.querySelectorAll('.welcome-scroll').forEach(s => s.classList.add('rolled'));
            }, 15000);
        };
    </script>
</body>
</html>
