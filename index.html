<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <!-- Font Medievale -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <h2 class="arch-title" style="font-size: 2rem;">Summoning Spirits...</h2>
        <div class="loading-container">
            <div id="loading-bar"></div>
        </div>
        <p id="loading-text">0%</p>
    </div>

    <!-- Cornici decorative -->
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <!-- Container Principale -->
    <div class="sanctum-container">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage">
        </div>
        
        <h1 class="arch-title">The Archmage</h1>
        
        <p class="introduction">
            "Greetings, traveler. You have found the gateway to my digital domain. Beyond this point lie artifacts of moderate power and questionable safety."
        </p>
        
        <a href="emporium/" class="arch-btn">ENTER THE EMPORIUM</a>
        
        <div class="rune-deco">᚛ ᚫ ᚜</div>
    </div>

    <!-- Script Unificato (Caricamento + Scintille) -->
    <script>
        // Gestione Loading
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 20;
            if (w >= 100) {
                w = 100;
                clearInterval(interval);
                setTimeout(() => {
                    const loader = document.getElementById('loading-overlay');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 400);
            }
            document.getElementById('loading-bar').style.width = w + '%';
            document.getElementById('loading-text').innerText = Math.floor(w) + '%';
        }, 150);

        // Scintille Magiche
        function createSpark() {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = Math.random() * 100 + 'vw';
            spark.style.top = '110vh';
            spark.style.opacity = Math.random();
            document.body.appendChild(spark);
            setTimeout(() => {
                spark.style.transform = 'translateY(-120vh) translateX(' + (Math.random() * 100 - 50) + 'px)';
                spark.style.opacity = '0';
            }, 100);
            setTimeout(() => spark.remove(), 10000);
        }
        setInterval(createSpark, 400);
    </script>
</body>
</html>
