<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <!-- Font Medievale Forzato -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* RESET E CURSORE GLOBALE */
        * { 
            cursor: url('archives/potionmini.png'), auto !important; 
            font-family: 'MedievalSharp', serif !important; 
        }

        body { background: #140f0a; color: #f3e5ab; margin: 0; overflow-x: hidden; }

        /* EFFETTO TENDINA (ROLL UP) */
        .sanctum-container {
            transition: max-height 1.5s ease-in-out, opacity 1s, transform 1.5s;
            overflow: hidden;
            max-height: 2000px;
            transform-origin: top;
        }

        .sanctum-container.rolled {
            max-height: 0;
            opacity: 0;
            transform: scaleY(0);
            pointer-events: none;
        }

        /* Tasto Riapertura */
        #unroll-btn {
            display: none;
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: #8b4513; border: 2px solid #d4af37;
            color: #f3e5ab; padding: 10px 25px; box-shadow: 0 0 15px #d4af37;
        }

        /* CORNICE ARCIMAGO: Più grande, circolare e luminosa */
        .archmage-frame {
            width: 280px; /* Ingrandita */
            height: 280px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            border: 4px solid #d4af37;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.4);
            background: #1a120b;
        }
        .archmage-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* AZIONI PARALLELE */
        .actions-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .brand-logo-inline {
            width: 80px;
            filter: drop-shadow(0 0 8px #d4af37);
            transition: 0.5s;
        }
        .brand-logo-inline:hover { transform: scale(1.1); }

        .bulletin-wrapper { position: relative; display: inline-block; }
        
        .scroll-preview {
            position: absolute; bottom: 130%; left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 240px; background: #fdf5e6;
            background-image: url('https://transparenttextures.com');
            color: #3d2b1f; padding: 1rem; border: 2px solid #8b4513;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: 0.3s;
            font-size: 0.9rem; z-index: 100;
        }

        .bulletin-wrapper:hover .scroll-preview {
            opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0);
        }

        .introduction .highlight { color: #d4af37; font-weight: bold; display: block; margin-top: 10px; }
        .arch-title { text-align: center; font-size: 3rem; color: #d4af37; margin-bottom: 0.5rem; }
        .sanctum-container { text-align: center; padding: 2rem; }
    </style>
</head>
<body>

    <!-- Pulsante Riapertura -->
    <button id="unroll-btn" onclick="unroll()">REVEAL THE SANCTUM</button>

    <div class="sanctum-container" id="pergamena">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage">
        </div>
        
        <h1 class="arch-title">The Archmage</h1>
        
        <p class="introduction">
            "Greetings, traveler. You have found the gateway to my digital domain."
            <span class="highlight">Rejoice in the light of guidance of The Archmage.</span>
        </p>
        
        <div class="actions-row">
            <a href="emporium/index.html" class="arch-btn">THE EMPORIUM</a>
            
            <div class="bulletin-wrapper">
                <a href="emporium/bulletins.html" class="arch-btn" style="background: #2a1a0a;">THE BULLETINS</a>
                <div class="scroll-preview">
                    <h4 style="margin:0; color:#7a1515">Oracle's Visions</h4>
                    <ul style="padding-left:20px; margin:10px 0 0 0; text-align:left;">
                        <li>4 rules 4 a bucolic life</li>
                        <li>3 spells for prosperity</li>
                        <li>4 secret 4 a perfect skin</li>
                    </ul>
                </div>
            </div>

            <!-- TERZO BOTTONE: VERSO IL TRIAL -->
            <a href="trial.html" class="arch-btn" style="background: #4a0404; border-color: #ffcc00;">THE TRIAL</a>

            <!-- LOGO IN LINEA -->
            <a href="secret.html" class="brand-logo-inline">
                <img src="archives/logo_archmage.png" alt="Logo">
            </a>
        </div>
        
        <div class="rune-deco" style="margin-top: 3rem; font-size: 2rem;">᚛ ᚫ ᚜</div>
    </div>

    <script>
        // LOGICA TENDINA (15 Secondi)
        setTimeout(() => {
            document.getElementById('pergamena').classList.add('rolled');
            document.getElementById('unroll-btn').style.display = 'block';
        }, 15000);

        function unroll() {
            document.getElementById('pergamena').classList.remove('rolled');
            document.getElementById('unroll-btn').style.display = 'none';
        }
    </script>
</body>
</html>
