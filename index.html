<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9932a;
            --gold-glow: rgba(201, 147, 42, 0.4);
            --bg: #090603;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: var(--bg);
            color: #e4d0a6;
            font-family: 'MedievalSharp', serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(201, 147, 42, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .sanctum-container { text-align: center; padding: 2rem; max-width: 800px; z-index: 1; }

        .archmage-frame {
            position: relative; width: 250px; height: 250px;
            margin: 0 auto 2rem; border-radius: 50%; padding: 10px;
            background: linear-gradient(135deg, var(--gold), #3d2810);
            box-shadow: 0 0 50px var(--gold-glow);
        }

        .archmage-frame img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--bg);
        }

        h1 {
            font-family: 'MedievalSharp', serif; font-size: clamp(2rem, 5vw, 3rem);
            color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); margin: 0;
        }

        .introduction {
            font-size: 1.4rem; font-style: italic; color: #8c7450;
            margin: 1.5rem 0 2.5rem; line-height: 1.6;
        }

        .portal-button {
            display: inline-block; padding: 1.2rem 3rem;
            background: transparent; color: var(--gold);
            text-decoration: none; font-family: 'MedievalSharp', serif;
            border: 2px solid var(--gold); transition: all 0.4s ease;
            letter-spacing: 2px;
        }

        .portal-button:hover {
            background: var(--gold); color: var(--bg);
            box-shadow: 0 0 30px var(--gold); transform: scale(1.05);
        }

        .rune-deco { margin-top: 3rem; color: var(--gold); opacity: 0.4; font-size: 1.5rem; }
    </style>
</head>
<body>
          <div class="sanctum-container">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage">
        </div>
        <h1>The Archmage</h1>
        <p class="introduction">
            "Greetings, traveler. You have found the gateway to my digital domain. Beyond this point lie artifacts of moderate power and questionable safety."
        </p>
        
        <a href="emporium/" class="portal-button">ENTER THE EMPORIUM</a>
        
        <div class="rune-deco">᚛ ᚫ ᚜</div>
    </div>

</body>
</html>
