<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* CSS INTEGRATO PER EVITARE ERRORI DI CARICAMENTO */
        body { 
            background: #140f0a; 
            color: #f3e5ab; 
            font-family: 'MedievalSharp', serif; 
            margin: 0; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #140f0a; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }

        .loading-container { width: 200px; height: 10px; border: 1px solid #d4af37; margin: 20px; }
        #loading-bar { width: 0%; height: 100%; background: #d4af37; }

        .sanctum-container { text-align: center; z-index: 10; max-width: 800px; padding: 20px; }
        
        .archmage-frame img { 
            width: 250px; border-radius: 50%; 
            border: 3px solid #d4af37; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .arch-title { font-size: 3rem; color: #d4af37; margin: 1rem 0; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .introduction { font-style: italic; line-height: 1.6; margin-bottom: 2rem; }
        .highlight { color: #d4af37; display: block; margin-top: 15px; font-weight: bold; }

        /* Bottoni Paralleli */
        .actions-container {
            display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap;
        }

        .arch-btn {
            background: #4a0404; color: #f3e5ab; padding: 12px 25px;
            text-decoration: none; border: 2px solid #d4af37;
            font-weight: bold; transition: 0.3s;
        }
        .arch-btn:hover { background: #7a1515; transform: scale(1.05); }

        .brand-logo-inline { width: 80px; filter: drop-shadow(0 0 5px #d4af37); transition: 0.5s; }

        /* Bulletin Preview */
        .bulletin-wrapper { position: relative; }
        .scroll-preview {
            position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
            width: 200px; background: #fdf5e6; color: #3d2b1f; padding: 10px;
            border: 2px solid #8b4513; opacity: 0; visibility: hidden; transition: 0.3s;
            font-size: 0.8rem; pointer-events: none;
        }
        .bulletin-wrapper:hover .scroll-preview { opacity: 1; visibility: visible; }

        .spark { position: absolute; width: 2px; height: 2px; background: #d4af37; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 style="color: #d4af37;">Summoning Spirits...</h2>
        <div class="loading-container"><div id="loading-bar"></div></div>
        <p id="loading-text">0%</p>
    </div>

    <div class="sanctum-container">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage" onerror="this.src='https://placeholder.com'">
        </div>
        
        <h1 class="arch-title">The Archmage</h1>
        
        <p class="introduction">
            "Greetings, traveler. You have found the gateway to my digital domain."
            <span class="highlight">Rejoice in the light of guidance of The Archmage.</span>
        </p>
        
        <div class="actions-container">
            <a href="emporium/index.html" class="arch-btn">THE EMPORIUM</a>
            
            <div class="bulletin-wrapper">
                <a href="emporium/bulletins.html" class="arch-btn" style="background: #2a1a0a;">BULLETINS</a>
                <div class="scroll-preview">
                    <b style="color:#7a1515">Visions:</b><br>
                    • Mirror Cracked<br>
                    • Mana Tax +5%<br>
                    • Relics Found
                </div>
            </div>

            <a href="secret.html" class="brand-logo-inline">
                <img src="archives/logo_archmage.png" alt="Logo" style="width: 100%;" onerror="this.parentElement.style.display='none'">
            </a>
        </div>
    </div>

    <script>
        // Loading velocizzato e sicuro
        let w = 0;
        const loaderInterval = setInterval(() => {
            w += Math.random() * 25;
            if (w >= 100) {
                w = 100;
                clearInterval(loaderInterval);
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-overlay').remove(), 500);
                }, 300);
            }
            document.getElementById('loading-bar').style.width = w + '%';
            document.getElementById('loading-text').innerText = Math.floor(w) + '%';
        }, 100);

        // Scintille
        function createSpark() {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = Math.random() * 100 + 'vw';
            spark.style.top = '100vh';
            document.body.appendChild(spark);
            setTimeout(() => {
                spark.style.transition = "all 5s linear";
                spark.style.transform = `translateY(-110vh) translateX(${(Math.random()-0.5)*200}px)`;
                spark.style.opacity = "0";
            }, 100);
            setTimeout(() => spark.remove(), 6000);
        }
        setInterval(createSpark, 500);
    </script>
</body>
</html>
