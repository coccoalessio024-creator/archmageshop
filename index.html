<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archmage's Sanctum</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Riferimento al tuo style.css esterno -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Correzioni layout parallelo e logo */
        .actions-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .brand-logo-inline {
            width: 80px;
            filter: drop-shadow(0 0 8px #d4af37);
            transition: 0.5s;
        }
        .brand-logo-inline img { width: 100%; height: auto; display: block; }

        .bulletin-wrapper { position: relative; display: inline-block; }
        
        .scroll-preview {
            position: absolute;
            bottom: 130%; left: 50%;
            transform: translateX(-50%) translateY(10px);
            width: 220px;
            background: #fdf5e6;
            background-image: url('https://transparenttextures.com');
            color: #3d2b1f;
            padding: 1rem;
            border: 2px solid #8b4513;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            font-size: 0.8rem;
            z-index: 100;
        }

        .bulletin-wrapper:hover .scroll-preview {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .introduction .highlight { color: #d4af37; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 class="arch-title">Summoning Spirits...</h2>
        <div class="loading-container"><div id="loading-bar"></div></div>
        <p id="loading-text">0%</p>
    </div>

    <div class="sanctum-container">
        <div class="archmage-frame">
            <img src="archives/Archmage.png.png" alt="The Archmage">
        </div>
        
        <h1 class="arch-title">The Archmage</h1>
        
        <p class="introduction">
            "Greetings, traveler. You have found the gateway to my digital domain."
            <span class="highlight">Rejoice in the light of guidance of The Archmage.</span>
        </p>
        
        <div class="actions-row">
            <a href="emporium/index.html" class="arch-btn">THE EMPORIUM</a>
            
            <div class="bulletin-wrapper">
                <a href="emporium/bulletins.html" class="arch-btn" style="background: #2a1a0a;">THE BULLETINS</a>
                <div class="scroll-preview">
                    <h4 style="margin:0; color:#7a1515">Oracle's Visions</h4>
                    <ul style="padding-left:20px; margin:10px 0 0 0; text-align:left;">
                        <li>Mirror Cracked</li>
                        <li>Mana Tax +5%</li>
                        <li>Relics Found</li>
                    </ul>
                </div>
            </div>

            <a href="secret.html" class="brand-logo-inline">
                <img src="archives/logo_archmage.png" alt="Logo">
            </a>
        </div>
    </div>

    <script>
        // Loading Script Semplificato e Sicuro
        let w = 0;
        const interval = setInterval(() => {
            w += Math.random() * 20;
            if (w >= 100) {
                w = 100;
                clearInterval(interval);
                const loader = document.getElementById('loading-overlay');
                if(loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
            }
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            if(bar) bar.style.width = w + '%';
            if(text) text.innerText = Math.floor(w) + '%';
        }, 120);
    </script>
</body>
</html>
