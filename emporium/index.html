<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Archmage's Emporium</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  
  <style>
    body { justify-content: flex-start !important; padding-top: 0; background: #140f0a; color: #f3e5ab; font-family: 'MedievalSharp', serif; margin: 0; display: flex; flex-direction: column; }

    /* HEADER */
    .tavern-header {
      position: sticky; top: 0; z-index: 100; width: 100%;
      background: rgba(20, 15, 10, 0.95);
      border-bottom: 2px solid #d4af37;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; box-sizing: border-box;
    }

    .nav-link { color: #d4af37 !important; text-decoration: none; margin-left: 1.5rem; font-weight: bold; }

    /* LAYOUT PRINCIPALE CON SIDEBAR */
    .main-container { display: flex; width: 100%; min-height: 100vh; }

    .products-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
      gap: 2rem; padding: 2rem;
    }

    /* SIDEBAR A CADUTA (Destra) */
    #checkout-sidebar {
      width: 250px;
      background: linear-gradient(180deg, #2a1a0a 0%, #140f0a 100%);
      border-left: 3px solid #d4af37;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: sticky;
      top: 70px; /* Sotto l'header */
      height: calc(100vh - 70px);
      transform: translateY(-100%); /* Nasconde sopra */
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
      box-shadow: -10px 0 20px rgba(0,0,0,0.5);
    }

    /* Classe attivata via JS */
    #checkout-sidebar.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .checkout-title { color: #d4af37; font-size: 1.2rem; text-align: center; margin-bottom: 2rem; border-bottom: 1px solid #d4af37; padding-bottom: 10px; width: 100%; }

    .sidebar-btn {
      background: #7a1515;
      color: #fdf5e6;
      padding: 15px;
      border: 2px solid #d4af37;
      border-radius: 8px;
      text-decoration: none;
      text-align: center;
      font-weight: bold;
      width: 100%;
      box-shadow: 0 5px 15px rgba(122, 21, 21, 0.4);
      transition: 0.3s;
    }
    .sidebar-btn:hover { background: #a11d1d; transform: scale(1.05); }

    /* CARD E IMMAGINI */
    .card { background: rgba(40, 30, 20, 0.4); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .item-btn { background: none; border: none; width: 175px; height: 175px; cursor: pointer; transition: 0.3s; }
    .item-btn:hover { transform: scale(1.1); }
    .item-img { width: 100%; height: 100%; object-fit: contain; }
    .small-buy-btn { background: #8b4513; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-family: 'MedievalSharp'; }
  </style>
</head>
<body>

  <header class="tavern-header">
    <span class="tavern-sign">The Emporium</span>
    <nav>
      <a href="../index.html" class="nav-link">Sanctum</a>
      <a href="cart.html" class="nav-link">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <div class="main-container">
    <main class="products-grid">
      <!-- Invisibility Brew -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Invisibility Brew', 45)">
          <img src="../archives/invisibilitybrew.png.png" class="item-img">
        </button>
        <h3>Invisibility Brew</h3>
        <button class="small-buy-btn" onclick="addToCart('Invisibility Brew', 45)">Add to Cauldron</button>
      </article>

      <!-- Silence Ring -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Silence Ring', 120)">
          <img src="../archives/silentring.png.png" class="item-img">
        </button>
        <h3>Ring of Silence</h3>
        <button class="small-buy-btn" onclick="addToCart('Silence Ring', 120)">Add to Cauldron</button>
      </article>

      <!-- Altri prodotti... -->
    </main>

    <!-- COLONNA LATERALE A CADUTA -->
    <aside id="checkout-sidebar">
      <h2 class="checkout-title">Your Loot</h2>
      <p style="text-align: center; font-style: italic; margin-bottom: 2rem;">The Archmage awaits your tribute.</p>
      <a href="cart.html" class="sidebar-btn">PROCEED TO CHECKOUT →</a>
    </aside>
  </div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart.push({ id: Date.now(), name: name, price: price });
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateUI();
    }

    function updateUI() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      const countEl = document.getElementById('cart-count');
      const sidebar = document.getElementById('checkout-sidebar');

      if(countEl) countEl.innerText = cart.length;

      // EFFETTO A CADUTA: Se c'è almeno un oggetto, aggiunge la classe .visible
      if(cart.length > 0) {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }
    }

    updateUI();
  </script>
</body>
</html>
