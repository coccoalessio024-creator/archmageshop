<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Archmage's Emporium</title>
  <link href="https://googleapis.com" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090603; --surface: #120a04; --border: #3d2810;
      --gold: #c9932a; --gold-bright: #e8b84b; --parchment: #e4d0a6;
    }
    body {
      margin: 0; background: var(--bg); color: var(--parchment);
      font-family: 'MedievalSharp', serif;
    }
    .tavern-header {
      position: sticky; top: 0; z-index: 50; padding: 1rem 1.5rem;
      background: linear-gradient(180deg, #050301 0%, #120a04 100%);
      border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
    }
    .tavern-sign { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 1.2rem; }
    .nav-link { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-bright); text-decoration: none; margin-left: 1.5rem; text-transform: uppercase; }
    
    .hero { padding: 3rem 1rem; text-align: center; border-bottom: 1px solid var(--border); }
    .hero-title { font-family: 'Cinzel Decorative', serif; font-size: 3rem; color: var(--gold); margin: 0; }

    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem; padding: 3rem 1.5rem; max-width: 80rem; margin: 0 auto;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); padding: 1.5rem;
      transition: 0.3s; text-align: center;
    }
    .card:hover { border-color: var(--gold); transform: translateY(-5px); }
    .price { color: var(--gold-bright); font-size: 1.2rem; margin: 1rem 0; }
    
    .btn-buy {
      width: 100%; padding: 0.8rem; background: #3d2c0e; border: 1px solid var(--gold);
      color: var(--gold-bright); font-family: 'Cinzel', serif; cursor: pointer;
    }
    .btn-buy:hover { background: var(--gold); color: var(--bg); }
  </style>
</head>
<body>

  <header class="tavern-header">
    <span class="tavern-sign">The Emporium</span>
    <nav class="nav">
    <a href="../index.html" class="nav-link">Sanctum</a>
    <a href="bulletins.html" class="nav-link">Bulletins</a>
    <a href="cart.html" class="nav-link">Cart (<span id="cart-count">0</span>)</a>
</nav>

  </header>

  <section class="hero">
    <h1 class="hero-title">Adequate Enchantments</h1>
    <p>Hand-picked artifacts of questionable stability.</p>
  </section>

  <main class="products-grid">
    <article class="card">
      <h3>"Maybe" Invisibility Brew</h3>
      <p class="price">45 Gold</p>
      <button class="btn-buy" onclick="addToCart('Invisibility Brew', 45)">Add to Cauldron</button>
    </article>

    <article class="card">
      <h3>Ring of Deafening Silence</h3>
      <p class="price">120 Gold</p>
      <button class="btn-buy" onclick="addToCart('Silence Ring', 120)">Add to Cauldron</button>
    </article>

    <article class="card">
      <h3>Treasure Map</h3>
      <p class="price">15 Gold</p>
      <button class="btn-buy" onclick="addToCart('Treasure Map', 15)">Add to Cauldron</button>
    </article>
  </main>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart.push({ id: Date.now(), name: name, price: price });
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateCount();
      alert("Spell added to cart!");
    }

    function updateCount() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      document.getElementById('cart-count').innerText = cart.length;
    }
    updateCount();
  </script>
</body>
</html>
