<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Archmage's Emporium</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  
  <style>
    /* Struttura Base: Niente scroll orizzontale */
    body { 
        background: #140f0a; 
        color: #f3e5ab; 
        font-family: 'MedievalSharp', serif; 
        margin: 0; 
        overflow-x: hidden; 
    }

    /* HEADER FISSO */
    .tavern-header {
      position: sticky; top: 0; z-index: 1000; width: 100%;
      background: rgba(20, 15, 10, 0.98);
      border-bottom: 2px solid #d4af37;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; box-sizing: border-box;
    }

    /* IL TRUCCO: Un contenitore flex che occupa tutto l'orizzonte */
    .main-wrapper {
      display: flex;
      width: 100vw;
      min-height: calc(100vh - 72px);
      align-items: flex-start;
    }

    /* Griglia prodotti: si espande (flex: 1) */
    .products-grid {
      flex: 1;
      display: grid;
      /* Configurazione per 4 colonne che diventano 2 su schermi piccoli */
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 2rem; 
      padding: 3rem;
      transition: all 0.5s ease-in-out;
    }

    /* SIDEBAR A COMPARSA */
    #checkout-sidebar {
      width: 0; /* Chiusa di default */
      height: calc(100vh - 72px);
      position: sticky; 
      top: 72px;
      background: linear-gradient(180deg, #2a1a0a 0%, #1a120b 100%);
      border-left: 0px solid #d4af37;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }

    /* Quando il carrello è pieno, la sidebar si apre a 350px */
    #checkout-sidebar.visible {
      width: 350px;
      border-left: 3px solid #d4af37;
      padding: 2rem 1.5rem;
    }

    /* RECAP ITEMS */
    .recap-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0; border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .remove-tiny {
      background: #7a1515; color: #fff; border: 1px solid #d4af37;
      padding: 4px 8px; cursor: pointer; border-radius: 4px; font-family: serif;
    }

    .sidebar-btn {
      background: #7a1515; color: #fdf5e6; padding: 15px;
      border: 2px solid #d4af37; border-radius: 8px;
      text-decoration: none; text-align: center; font-weight: bold;
      margin-top: auto; transition: 0.3s;
    }
    .sidebar-btn:hover { background: #a11d1d; box-shadow: 0 0 15px #d4af37; }

    /* CARD DESIGN (Immagini grandi +15%) */
    .card { 
      background: rgba(40, 30, 20, 0.5); 
      border: 1px solid rgba(212, 175, 55, 0.2); 
      border-radius: 15px; padding: 1.5rem; 
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.3s;
    }
    .card:hover { border-color: #d4af37; background: rgba(60, 45, 30, 0.6); }

    .item-btn { 
      background: none; border: none; 
      width: 185px; height: 185px; /* Dimensione aumentata */
      cursor: pointer; transition: 0.3s; 
    }
    .item-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
    
    .price-tag { color: #ffcc00; font-size: 1.2rem; margin: 10px 0; }
    .small-buy-btn { 
        background: #8b4513; color: white; border: none; 
        padding: 10px 25px; border-radius: 5px; cursor: pointer; 
        font-family: 'MedievalSharp'; font-size: 1rem;
    }
  </style>
</head>
<body>

  <header class="tavern-header">
    <span style="color:#d4af37; font-size: 1.6rem;">The Royal Emporium</span>
    <nav>
        <a href="../index.html" style="color:#d4af37; text-decoration:none; margin-right: 20px;">Sanctum</a>
        <span style="color:#ffcc00;">Items: <span id="cart-count">0</span></span>
    </nav>
  </header>

  <div class="main-wrapper">
    <!-- Griglia Prodotti -->
    <main class="products-grid">
      <article class="card">
        <button class="item-btn" onclick="addToCart('Invisibility Brew', 45)">
          <img src="../archives/invisibilitybrew.png.png" class="item-img">
        </button>
        <h3>Invisibility Brew</h3>
        <span class="price-tag">45 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Invisibility Brew', 45)">Add to Cart</button>
      </article>

      <article class="card">
        <button class="item-btn" onclick="addToCart('Silence Ring', 120)">
          <img src="../archives/silentring.png.png" class="item-img">
        </button>
        <h3>Ring of Silence</h3>
        <span class="price-tag">120 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Silence Ring', 120)">Add to Cart</button>
      </article>

      <article class="card">
        <button class="item-btn" onclick="addToCart('Magic Mirror', 55)">
          <img src="../archives/magicmirror.png.png" class="item-img">
        </button>
        <h3>Magic Mirror</h3>
        <span class="price-tag">55 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Magic Mirror', 55)">Add to Cart</button>
      </article>

      <article class="card">
        <button class="item-btn" onclick="addToCart('Treasure Map', 15)">
          <img src="../archives/treasuremap.png.png" class="item-img">
        </button>
        <h3>Treasure Map</h3>
        <span class="price-tag">15 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Treasure Map', 15)">Add to Cart</button>
      </article>
    </main>

    <!-- Sidebar con effetto a comparsa orizzontale -->
    <aside id="checkout-sidebar">
      <h2 style="color:#d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px;">Order Manifest</h2>
      <div id="recap-list" style="flex: 1; overflow-y: auto;">
        <!-- JS renderizza qui -->
      </div>
      <div id="total-price" style="font-size: 1.5rem; color: #ffcc00; padding: 15px 0; border-top: 1px solid #d4af37;">
        Total: 0 Gold
      </div>
      <a href="cart.html" class="sidebar-btn">PROCEED TO CHECKOUT →</a>
    </aside>
  </div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart.push({ id: Date.now(), name: name, price: price });
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateUI();
    }

    function removeItem(id) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateUI();
    }

    function updateUI() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      const sidebar = document.getElementById('checkout-sidebar');
      const recapList = document.getElementById('recap-list');
      const totalPrice = document.getElementById('total-price');
      const countEl = document.getElementById('cart-count');

      countEl.innerText = cart.length;
      recapList.innerHTML = '';
      let total = 0;

      cart.forEach(item => {
        total += item.price;
        recapList.innerHTML += `
          <div class="recap-item">
            <span>${item.name}</span>
            <div>
              <span style="color:#ffcc00; margin-right:10px;">${item.price}g</span>
              <button class="remove-tiny" onclick="removeItem(${item.id})">X</button>
            </div>
          </div>`;
      });

      totalPrice.innerText = "Total: " + total + " Gold";

      // LOGICA APERTURA: La sidebar scivola e la griglia si restringe
      if(cart.length > 0) {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }
    }

    updateUI();
  </script>
</body>
</html>
