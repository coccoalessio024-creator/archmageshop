<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Archmage's Emporium</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  
  <style>
    body { background: #140f0a; color: #f3e5ab; font-family: 'MedievalSharp', serif; margin: 0; }

    /* HEADER */
    .tavern-header {
      position: sticky; top: 0; z-index: 1000; width: 100%;
      background: rgba(20, 15, 10, 0.98);
      border-bottom: 2px solid #d4af37;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; box-sizing: border-box;
    }

    /* CONTAINER PRINCIPALE */
    .main-container { display: flex; transition: all 0.5s ease; }

    .products-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 1.5rem; padding: 2rem;
      transition: all 0.5s ease;
    }

    /* SIDEBAR A CADUTA CON RECAP */
    #checkout-sidebar {
      width: 0; /* Inizia chiusa */
      overflow: hidden;
      background: linear-gradient(180deg, #2a1a0a 0%, #140f0a 100%);
      border-left: 0px solid #d4af37;
      padding: 0;
      height: calc(100vh - 72px);
      position: sticky; top: 72px;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      display: flex; flex-direction: column;
    }

    #checkout-sidebar.visible {
      width: 320px;
      border-left: 3px solid #d4af37;
      padding: 1.5rem;
    }

    /* LISTA RECAP */
    #recap-list {
      flex-grow: 1;
      overflow-y: auto;
      margin: 1rem 0;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .recap-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 0; border-bottom: 1px dashed rgba(212, 175, 55, 0.2);
      font-size: 0.9rem;
    }

    .remove-tiny {
      background: #7a1515; color: #fff; border: none; 
      padding: 2px 6px; cursor: pointer; border-radius: 3px; font-size: 0.7rem;
    }

    .sidebar-btn {
      background: #7a1515; color: #fdf5e6; padding: 12px;
      border: 2px solid #d4af37; border-radius: 8px;
      text-decoration: none; text-align: center; font-weight: bold;
      transition: 0.3s; margin-top: 10px;
    }

    /* CARD DESIGN */
    .card { background: rgba(40, 30, 20, 0.6); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 1rem; text-align: center; }
    .item-btn { background: none; border: none; width: 160px; height: 160px; cursor: pointer; transition: 0.3s; }
    .item-btn:hover { transform: scale(1.05); }
    .item-img { width: 100%; height: 100%; object-fit: contain; }
    .small-buy-btn { background: #8b4513; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-family: 'MedievalSharp'; }
  </style>
</head>
<body>

  <header class="tavern-header">
    <span style="color:#d4af37; font-size: 1.5rem;">The Emporium</span>
    <nav>
      <a href="cart.html" class="nav-link" style="color:#d4af37; text-decoration:none;">Loot Box (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <div class="main-container">
    <main class="products-grid">
      <!-- Invisibility Brew -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Invisibility Brew', 45)">
          <img src="../archives/invisibilitybrew.png.png" class="item-img">
        </button>
        <h3>Invisibility Brew</h3>
        <span style="display:block; color:#ffcc00; margin-bottom:10px;">45 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Invisibility Brew', 45)">Add</button>
      </article>

      <!-- Ring of Silence -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Silence Ring', 120)">
          <img src="../archives/silentring.png.png" class="item-img">
        </button>
        <h3>Ring of Silence</h3>
        <span style="display:block; color:#ffcc00; margin-bottom:10px;">120 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Silence Ring', 120)">Add</button>
      </article>

      <!-- Magic Mirror -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Magic Mirror', 55)">
          <img src="../archives/magicmirror.png.png" class="item-img">
        </button>
        <h3>Magic Mirror</h3>
        <span style="display:block; color:#ffcc00; margin-bottom:10px;">55 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Magic Mirror', 55)">Add</button>
      </article>

      <!-- Treasure Map -->
      <article class="card">
        <button class="item-btn" onclick="addToCart('Treasure Map', 15)">
          <img src="../archives/treasuremap.png.png" class="item-img">
        </button>
        <h3>Treasure Map</h3>
        <span style="display:block; color:#ffcc00; margin-bottom:10px;">15 Gold</span>
        <button class="small-buy-btn" onclick="addToCart('Treasure Map', 15)">Add</button>
      </article>
    </main>

    <!-- SIDEBAR DINAMICA -->
    <aside id="checkout-sidebar">
      <h2 style="color:#d4af37; border-bottom:1px solid #d4af37;">Manifest</h2>
      <div id="recap-list">
        <!-- Oggetti inseriti qui via JS -->
      </div>
      <div id="total-recap" style="margin-bottom:10px; font-weight:bold; color:#ffcc00;"></div>
      <a href="cart.html" class="sidebar-btn">PROCEDI AL PAGAMENTO →</a>
    </aside>
  </div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart.push({ id: Date.now(), name: name, price: price });
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateUI();
    }

    function removeItem(id) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateUI();
    }

    function updateUI() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      const sidebar = document.getElementById('checkout-sidebar');
      const recapList = document.getElementById('recap-list');
      const totalRecap = document.getElementById('total-recap');
      const countEl = document.getElementById('cart-count');

      countEl.innerText = cart.length;
      recapList.innerHTML = '';
      let total = 0;

      cart.forEach(item => {
        total += item.price;
        recapList.innerHTML += `
          <div class="recap-item">
            <span>${item.name}</span>
            <div>
              <span style="margin-right:10px;">${item.price}g</span>
              <button class="remove-tiny" onclick="removeItem(${item.id})">X</button>
            </div>
          </div>`;
      });

      totalRecap.innerText = "Total: " + total + " Gold";

      if(cart.length > 0) {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }
    }

    updateUI();
  </script>
</body>
</html>
