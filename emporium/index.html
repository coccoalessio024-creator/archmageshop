<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Archmage's Emporium</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <!-- Link al CSS Esterno (Esce dalla cartella con ../) -->
  <link rel="stylesheet" href="../style.css">
  
  <style>
    /* Stili specifici per l'animazione degli oggetti */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    
    .fire-border .item-img { animation: float 3s ease-in-out infinite; }
    .spectral-border .item-img { animation: float 4s ease-in-out infinite; }

    /* Fix per la navigazione superiore */
    .tavern-header {
      position: sticky; top: 0; z-index: 50; padding: 1rem 1.5rem;
      background: linear-gradient(180deg, #050301 0%, #120a04 100%);
      border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center;
      width: 100%; box-sizing: border-box;
    }
    .nav-link { color: var(--gold); text-decoration: none; margin-left: 1.5rem; text-transform: uppercase; font-size: 14px; }
    .nav-link:hover { color: var(--amber); text-shadow: 0 0 5px var(--fire); }
  </style>
</head>
<body>

  <header class="tavern-header">
    <span class="tavern-sign" style="color: var(--gold); font-size: 1.5rem; font-weight: bold;">The Emporium</span>
    <nav>
      <a href="../index.html" class="nav-link">Sanctum</a>
      <a href="bulletins.html" class="nav-link">Bulletins</a>
      <a href="cart.html" class="nav-link">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <section class="hero" style="text-align: center; width: 100%;">
    <h1 class="arch-title">Magical Trinkets</h1>
    <p style="color: var(--gold); font-style: italic; margin-top: -1rem;">"Artifacts of moderate power and questionable stability."</p>
  </section>

  <main class="products-grid">
    <!-- Invisibility Brew -->
    <article class="card fire-border">
      <img src="../archives/invisibilitybrew.png.png" class="item-img" alt="Brew">
      <h3>Invisibility Brew</h3>
      <p style="color: var(--amber); font-size: 1.4rem; margin: 0.5rem 0;">45 Gold</p>
      <button class="arch-btn" onclick="addToCart('Invisibility Brew', 45)">Add to Cauldron</button>
    </article>

    <!-- Ring of Silence -->
    <article class="card">
      <img src="../archives/silentring.png.png" class="item-img" alt="Ring">
      <h3>Ring of Silence</h3>
      <p style="color: var(--amber); font-size: 1.4rem; margin: 0.5rem 0;">120 Gold</p>
      <button class="arch-btn" onclick="addToCart('Silence Ring', 120)">Add to Cauldron</button>
    </article>
    
    <!-- Magic Mirror -->
    <article class="card spectral-border">
      <img src="../archives/magicmirror.png.png" class="item-img" alt="Mirror">
      <h3>Magic Mirror</h3>
      <p style="color: var(--amber); font-size: 1.4rem; margin: 0.5rem 0;">55 Gold</p>
      <button class="arch-btn" onclick="addToCart('Magic Mirror', 55)">Add to Cauldron</button>
    </article>
    
    <!-- Treasure Map -->
    <article class="card">
      <img src="../archives/treasuremap.png.png" class="item-img" alt="Map">
      <h3>Treasure Map</h3>
      <p style="color: var(--amber); font-size: 1.4rem; margin: 0.5rem 0;">15 Gold</p>
      <button class="arch-btn" onclick="addToCart('Treasure Map', 15)">Add to Cauldron</button>
    </article>
  </main>

  <!-- Angoli decorativi -->
  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <script>
    function addToCart(name, price) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      cart.push({ id: Date.now(), name: name, price: price });
      localStorage.setItem('magicCart', JSON.stringify(cart));
      updateCount();
      console.log(name + " added to cauldron");
    }

    function updateCount() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      const el = document.getElementById('cart-count');
      if(el) el.innerText = cart.length;
    }
    updateCount();
  </script>
</body>
</html>
