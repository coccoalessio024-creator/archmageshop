<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Royal Depository - Cart</title>
  <link href="https://googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Reset e Layout */
    body { justify-content: flex-start !important; padding: 2rem 0; background-color: #1a120b; }
    
    .parchment-box {
        background: #fdf5e6; background-image: url('https://transparenttextures.com');
        color: #3d2b1f !important; border: 15px solid transparent;
        border-image: url('https://transparenttextures.com') 30 stretch; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); padding: 3rem; border-radius: 5px; max-width: 600px; margin: 0 auto;
    }

    .item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(139, 69, 19, 0.4); padding: 1rem 0; color: #3d2b1f; }
    
    .remove-btn { 
        background: #7a1515; border: 1px solid #3d2810; color: #fdf5e6; 
        cursor: pointer; padding: 5px 10px; font-family: 'MedievalSharp', serif;
        font-size: 0.7rem; border-radius: 5px; transition: 0.3s;
    }
    .remove-btn:hover { background: #a11d1d; }

    .total { 
        font-size: 2.2rem; color: #7a1515; display: flex; 
        justify-content: space-between; font-weight: bold; margin-top: 1rem;
        font-family: 'MedievalSharp', serif;
    }

    .back { display: block; text-align: center; margin-top: 2rem; color: #8b4513; text-decoration: underline; font-weight: bold; }
    .arch-title { text-align: center; color: #f3e5ab; font-family: 'MedievalSharp', serif; margin-bottom: 2rem; }

    /* --- STILE CORONA LEGACY (FUOCO E ORO) --- */
    #legacy-portal { display: none; text-align: center; margin-top: 2.5rem; animation: fadeIn 1s ease; }
    
    .legacy-crown-btn {
        width: 95px; height: 95px; margin: 0 auto;
        background: radial-gradient(circle, rgba(255, 69, 0, 0.4) 0%, transparent 70%);
        border: 3px solid #d4af37; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        box-shadow: 0 0 20px #ff4500, inset 0 0 15px #ff4500;
        animation: pulse-fire 1.5s infinite alternate; transition: 0.3s; cursor: pointer;
    }
    
    .legacy-crown-btn img { width: 65%; filter: drop-shadow(0 0 5px #d4af37); image-rendering: pixelated; }
    
    .legacy-crown-btn:hover { 
        transform: scale(1.1); 
        box-shadow: 0 0 35px #ff4500, inset 0 0 25px #d4af37; 
    }

    @keyframes pulse-fire { 
        from { filter: brightness(1); transform: scale(1); } 
        to { filter: brightness(1.4); transform: scale(1.05); } 
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <h1 class="arch-title">The Royal Depository</h1>

  <div class="parchment-box">
    <div id="cart-content"></div>
    
    <div class="summary">
      <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem; font-weight: bold;">
        <span>Arcane Tax (5%)</span>
        <span id="tax-val">0.00 Gold</span>
      </div>
      <div class="total">
        <span>TOTAL:</span>
        <span id="total-val">0.00 Gold</span>
      </div>
    </div>

    <div class="paypal-section">
      <!-- BOTTONE PAYPAL DIRETTO A @HEAVENCATEN -->
      <a href="#" id="paypal-link" class="arch-btn" 
         style="display: none; text-align: center; margin-top: 2rem; background: #8b4513; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; border: 2px solid #d4af37;">
         TRIBUTE TO THE BRAVES
      </a>
      
      <!-- PORTALE LEGACY (Sbloccato dai Trial) -->
      <div id="legacy-portal">
        <a href="https://thearchmagemagicshop.duckdns.org/legacy.html" style="text-decoration: none;">
            <div class="legacy-crown-btn">
                <img src="../archives/crown.png" alt="Crown">
            </div>
            <p style="color: #8b4513; font-family: 'MedievalSharp'; margin-top: 10px; font-size: 0.9rem; font-weight: bold;">
                VIEW YOUR LEGACY HERE
            </p>
        </a>
      </div>

      <p style="font-size:0.8rem; font-style:italic; text-align:center; margin-top:1.5rem; color: #8b4513;">Monitored by the Archmage.</p>
      <a href="index.html" class="back">← Return to Emporium</a>
    </div>
  </div>

  <script>
    function render() {
      const cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      const container = document.getElementById('cart-content');
      let subtotal = 0;
      
      container.innerHTML = cart.length === 0 ? 
        '<p style="text-align:center; font-weight:bold; color:#3d2b1f;">The cauldron is empty, traveler.</p>' : '';

      cart.forEach(item => {
        subtotal += item.price;
        container.innerHTML += `
          <div class="item-row">
            <div><strong>${item.name}</strong><br><small>${item.price} Gold</small></div>
            <button class="remove-btn" onclick="removeItem(${item.id})">REMOVE</button>
          </div>`;
      });

      const tax = subtotal * 0.05;
      const finalValue = (subtotal + tax).toFixed(2);
      document.getElementById('tax-val').innerText = tax.toFixed(2) + " Gold";
      document.getElementById('total-val').innerText = finalValue + " Gold";
      


      const btn = document.getElementById('paypal-link');

if (parseFloat(finalValue) > 0) {

  const amount = Math.round(Number(finalValue));
  const paypalUrl = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=heavencaten&amount=${amount}&currency_code=USD`;

  btn.href = paypalUrl;              
  btn.style.display = 'block';

  btn.onclick = function (e) {
    e.preventDefault();
    location.assign(paypalUrl);
  };

} else {
  btn.style.display = 'none';
  btn.onclick = null; // importante per evitare click vecchi
}
      
      // --- CONTROLLO ACCESSO LEGACY PAGE ---
      const t1 = localStorage.getItem('trial_1') === 'true';
      const t2 = localStorage.getItem('trial_2') === 'true';
      const t3 = localStorage.getItem('trial_3') === 'true';
      
      if (t1 && t2 && t3) {
        document.getElementById('legacy-portal').style.display = 'block';
      }
    }

    function removeItem(id) {
      let cart = JSON.parse(localStorage.getItem('magicCart')) || [];
      localStorage.setItem('magicCart', JSON.stringify(cart.filter(i => i.id !== id)));
      render();
    }

    // Inizializza il carrello
    render();
  </script>
  
  <!-- Script Universale HUD -->
  <script src="../archmage-logic.js"></script>
</body>
</html>
