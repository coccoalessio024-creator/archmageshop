<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcane Archive — Bulletins</title>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    :root { 
      --gold: #c9932a; 
      --bg: #090603; 
      --surface: #120a04; 
      --border: #3d2810;
      --parchment: #d4b38d; /* Colore base pergamena */
    }

    body { 
      margin: 0; 
      background: var(--bg); 
      color: #e4d0a6; 
      font-family: 'MedievalSharp', serif; 
      background-image: radial-gradient(circle at center, #1a120b 0%, #090603 100%);
    }

    .header { padding: 3rem; text-align: center; border-bottom: 1px solid var(--border); }
    h1 { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 3rem; text-shadow: 0 0 15px rgba(201, 147, 42, 0.5); margin: 0; }
    
    .archive-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 3rem; padding: 4rem 2rem; max-width: 1100px; margin: 0 auto;
    }

    /* Stile Pergamena */
    .parchment-card {
      background: linear-gradient(135deg, #e4d0a6 0%, #d4b38d 100%);
      color: #3d2810;
      padding: 15px;
      position: relative;
      transition: 0.5s ease;
      cursor: pointer;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.7);
      border-radius: 2px;
      /* Effetto bordi consumati */
      border: 1px solid #b89060;
      clip-path: polygon(0% 2%, 100% 0%, 98% 100%, 2% 98%);
    }

    .parchment-card:hover {
      transform: rotate(-1deg) scale(1.05);
      box-shadow: 0 0 30px var(--gold);
    }

    .preview-box {
      width: 100%;
      height: 250px;
      background: #1c1208;
      margin-bottom: 1rem;
      border: 1px solid rgba(61, 40, 16, 0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
      transition: 0.5s;
    }

    .parchment-card:hover .preview-box img {
      opacity: 1;
      transform: scale(1.1);
    }
    
    .file-info h2 { 
      font-family: 'Cinzel Decorative', serif; 
      font-size: 1.2rem; 
      margin: 0.5rem 0; 
      border-bottom: 1px solid rgba(61, 40, 16, 0.2);
    }

    .seal {
      position: absolute;
      bottom: -10px;
      right: -10px;
      width: 60px;
      height: 60px;
      background: #7a1515;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e4d0a6;
      font-size: 1.5rem;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      transform: rotate(15deg);
      border: 2px solid #5a0f0f;
    }

    .back-nav { text-align: center; padding: 4rem; }
    .back-btn { 
      color: var(--gold); 
      text-decoration: none; 
      font-size: 1.2rem; 
      border: 1px solid var(--gold);
      padding: 10px 25px;
      transition: 0.3s;
    }
    .back-btn:hover { background: var(--gold); color: var(--bg); }
  </style>
</head>
<body>

  <div class="header">
    <h1>The Arcane Archive</h1>
    <p style="color: var(--gold); font-style: italic;">"History is written by those who survive the backfire."</p>
  </div>

  <div class="archive-grid">
    
    <!-- Bollettino 1 -->
    <div class="parchment-card" onclick="window.open('bulletin1.html', '_blank')">
      <div class="preview-box">
        <img src="../archives/Bulletin1 web.png" alt="Bulletin I">
      </div>
      <div class="file-info">
        <h2>Bulletin I</h2>
        <p>The Blue Frog Incident</p>
      </div>
      <div class="seal">📜</div>
    </div>

    <!-- Bollettino 2 -->
    <div class="parchment-card" onclick="window.open('bulletin2.html', '_blank')">
      <div class="preview-box">
        <img src="../archives/Bulletin2.png" alt="Bulletin II">
      </div>
      <div class="file-info">
        <h2>Bulletin II</h2>
        <p>Taxes & Levitation</p>
      </div>
      <div class="seal">📜</div>
    </div>

    <!-- Bollettino 3 -->
    <div class="parchment-card" onclick="window.open('bulletin3.html', '_blank')">
      <div class="preview-box">
        <img src="../archives/Bulletin3.png" alt="Bulletin III">
      </div>
      <div class="file-info">
        <h2>Bulletin III</h2>
        <p>The Void Leakage</p>
      </div>
      <div class="seal">📜</div>
    </div>

  </div>

  <div class="back-nav">
    <a href="../index.html" class="back-btn">← RETURN TO SANCTUM</a>
  </div>

</body>
</html>
