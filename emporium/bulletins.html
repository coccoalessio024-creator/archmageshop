<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcane Archive — Bulletins</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
  <!-- Link al CSS Esterno (esce dalla cartella con ../) -->
  <link rel="stylesheet" href="../style.css">
  
  <style>
    /* Stili specifici per le pergamene dei bollettini */
    .archive-grid {
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 3rem; padding: 4rem 2rem; max-width: 1100px; margin: 0 auto;
      position: relative; z-index: 5;
    }

    .parchment-card {
      background: linear-gradient(135deg, #e4d0a6 0%, #d4b38d 100%);
      color: #3d2810;
      padding: 15px;
      position: relative;
      transition: 0.5s ease;
      cursor: pointer;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.7);
      clip-path: polygon(0% 2%, 100% 0%, 98% 100%, 2% 98%);
      border: 1px solid #b89060;
    }

    .parchment-card:hover {
      transform: rotate(-1deg) scale(1.05);
      box-shadow: 0 0 30px var(--gold);
    }

    .preview-box {
      width: 100%; height: 250px; background: #1c1208;
      margin-bottom: 1rem; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    .preview-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    
    .file-info h2 { font-size: 1.4rem; margin: 0.5rem 0; border-bottom: 1px solid rgba(61, 40, 16, 0.2); }

    .seal {
      position: absolute; bottom: -10px; right: -10px;
      width: 50px; height: 50px; background: #7a1515;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #e4d0a6; transform: rotate(15deg); border: 2px solid #5a0f0f;
    }

    .back-nav { text-align: center; padding: 4rem; position: relative; z-index: 5; }
  </style>
</head>
<body>

  <div class="header" style="text-align: center; padding-top: 3rem;">
    <!-- Titolo metallico universale -->
    <h1 class="arch-title">The Arcane Archive</h1>
    <p style="color: var(--gold); font-style: italic;">"History is written by those who survive the backfire."</p>
  </div>

  <div class="archive-grid">
    <!-- Bollettino 1 -->
    <div class="parchment-card" onclick="window.open('../archives/Bulletin1 web.png', '_blank')">
      <div class="preview-box"><img src="../archives/Bulletin1 web.png" alt="Bulletin I"></div>
      <div class="file-info">
        <h2>Bulletin I</h2>
        <p>TAB- 4 rules 4 a bucolic life</p>
      </div>
      <div class="seal">📜</div>
    </div>

    <!-- Bollettino 2 -->
    <div class="parchment-card" onclick="window.open('../archives/Bulletin2.png', '_blank')">
      <div class="preview-box"><img src="../archives/Bulletin2.png" alt="Bulletin II"></div>
      <div class="file-info">
        <h2>Bulletin II</h2>
        <p>TAB- 3 spells for prosperity</p>
      </div>
      <div class="seal">📜</div>
    </div>

    <!-- Bollettino 3 -->
    <div class="parchment-card" onclick="window.open('../archives/Bulletin3.png', '_blank')">
      <div class="preview-box"><img src="../archives/Bulletin3.png" alt="Bulletin III"></div>
      <div class="file-info">
        <h2>Bulletin III</h2>
        <p>TAB- 4 secrets 4 a perfect skin</p>
      </div>
      <div class="seal">📜</div>
    </div>
  </div>

  <div class="back-nav">
    <!-- Bottone targa universale -->
    <a href="../index.html" class="arch-btn">← RETURN TO SANCTUM</a>
  </div>

</body>
</html>
