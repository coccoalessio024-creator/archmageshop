<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Final Awakening</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'MedievalSharp', serif !important; touch-action: none; -webkit-user-drag: none; box-sizing: border-box; outline: none; border: none; }
        body { background: #050505; color: #00fbff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* VIGNE E BORDI */
        .arcane-border { position: fixed; top: 0; bottom: 0; width: 40px; background: rgba(0, 251, 255, 0.05); z-index: 100; display: flex; flex-direction: column; justify-content: space-around; align-items: center; }
        .b-left { left: 0; border-right: 1px solid #00fbff; } .b-right { right: 0; border-left: 1px solid #00fbff; }
        .vine-leaf { font-size: 1rem; }

        /* DIVINE BAR */
        .divine-container { width: 70%; max-width: 600px; height: 25px; border: 2px solid #00fbff; margin: 20px 0; background: #000; z-index: 150; }
        #divine-fill { width: 0%; height: 100%; background: #00fbff; transition: width 0.5s; }

        /* AREA CENTRALE */
        .ritual-wrapper { position: relative; width: 100vw; height: 60vh; display: flex; justify-content: center; align-items: center; }
        #actual-mage { height: 100%; max-width: 90%; object-fit: contain; transition: 1.5s; filter: brightness(0.2) grayscale(1); z-index: 5; }
        .awakened { filter: brightness(1.2) grayscale(0) !important; drop-shadow: 0 0 50px #d4af37 !important; }

        /* SVG LINEE */
        #ritual-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ritual-line { stroke: #00fbff; stroke-width: 2; opacity: 0; transition: 1s; }
        .line-active { opacity: 1; }

        /* SLOT */
        .drop-zone { position: absolute; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; z-index: 20; }
        #zone-head { top: 5%; left: 50%; transform: translateX(-50%); }
        #zone-hand { top: 40%; left: 25%; }
        #zone-base { bottom: 5%; left: 50%; transform: translateX(-50%); }
        #zone-heart { top: 35%; left: 55%; transform: translateX(-50%); }

        .target-slot { width: 60px; opacity: 0.1; filter: invert(1); }
        .active-slot { opacity: 1 !important; filter: drop-shadow(0 0 20px #00fbff) brightness(2) !important; }

        /* GEMME (Stile Emporio) */
        .gem-stack { display: flex; justify-content: center; gap: 20px; padding: 20px; z-index: 1000; width: 100%; background: rgba(0,0,0,0.3); }
        .gem { 
            width: 70px; height: 70px; 
            filter: drop-shadow(0 0 10px #ff4500); 
            cursor: pointer; 
            -webkit-user-select: none;
            user-select: none;
        }

        #ascension-msg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; padding: 2rem; border: 2px solid #fff; text-align: center; z-index: 10000; box-shadow: 0 0 100px #00fbff; }
        
        .shake-active { animation: earthquake 0.1s linear infinite; }
        @keyframes earthquake { 0% { transform: translate(0,0); } 20% { transform: translate(-4px,4px); } 40% { transform: translate(4px,-4px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>

    <div class="arcane-border b-left" id="vines-l"></div>
    <div class="arcane-border b-right" id="vines-r"></div>
    <div class="divine-container"><div id="divine-fill"></div></div>

    <div class="ritual-wrapper" id="capture-area">
        <svg id="ritual-svg"><line id="line1" class="ritual-line"/><line id="line2" class="ritual-line"/><line id="line3" class="ritual-line"/><line id="line4" class="ritual-line"/></svg>
        <img src="archives/actualmage.png" id="actual-mage">
        <div class="drop-zone" id="zone-head"><img src="archives/coinslot.png" class="target-slot"></div>
        <div class="drop-zone" id="zone-hand"><img src="archives/coinslot.png" class="target-slot"></div>
        <div class="drop-zone" id="zone-base"><img src="archives/coinslot.png" class="target-slot"></div>
        <div class="drop-zone" id="zone-heart"><img src="archives/coinslot.png" class="target-slot" style="display:none"></div>
    </div>

    <div class="gem-stack">
        <img src="archives/coingem.png" id="g1" class="gem">
        <img src="archives/coingem.png" id="g2" class="gem">
        <img src="archives/coingem.png" id="g3" class="gem">
        <img src="archives/coingem.png" id="g4" class="gem">
    </div>

    <div id="ascension-msg">
        <h1 style="color:#fff;">VOID-ASCENSION-000</h1>
        <a href="index.html" style="color:#d4af37; text-decoration: none;">[ RETURN ]</a>
    </div>

    <script>
        const vL = document.getElementById('vines-l'); const vR = document.getElementById('vines-r');
        for(let i=0; i<15; i++) { vL.innerHTML += '<span class="vine-leaf">🌿</span>'; vR.innerHTML += '<span class="vine-leaf">🌿</span>'; }

        let solved = 0;
        let activeItem = null;
        const zonesOrder = ['zone-head', 'zone-hand', 'zone-base', 'zone-heart'];

        function updateLines() {
            const area = document.getElementById('capture-area').getBoundingClientRect();
            const pts = zonesOrder.map(id => {
                const r = document.getElementById(id).getBoundingClientRect();
                return { x: r.left + r.width/2 - area.left, y: r.top + r.height/2 - area.top };
            });
            for(let i=0; i < solved; i++) {
                let l = document.getElementById('line' + (i+1));
                let n = (i + 1) % 4;
                l.setAttribute('x1', pts[i].x); l.setAttribute('y1', pts[i].y);
                l.setAttribute('x2', pts[n].x); l.setAttribute('y2', pts[n].y);
                l.classList.add('line-active');
            }
        }

        function handleDrop(gemId, zoneId) {
            if (solved < 3 && zoneId === 'zone-heart') return;
            const zone = document.getElementById(zoneId);
            const slot = zone.querySelector('.target-slot');
            if (!slot.classList.contains('active-slot')) {
                slot.style.display = "block";
                slot.classList.add('active-slot');
                document.getElementById(gemId).style.display = 'none';
                solved++;
                document.getElementById('divine-fill').style.width = (solved * 25) + '%';
                updateLines();
                document.getElementById('actual-mage').style.filter = `brightness(${0.2 + (solved * 0.2)}) grayscale(${1 - (solved * 0.25)})`;
                if (solved === 3) document.querySelector('#zone-heart .target-slot').style.display = "block";
                if (solved === 4) {
                    localStorage.setItem('trial_3', 'true'); // Accende la terza gemma
                    document.body.classList.add('shake-active');
                    document.getElementById('actual-mage').classList.add('awakened');
                    setTimeout(() => { document.body.classList.remove('shake-active'); document.getElementById('ascension-msg').style.display = 'block'; }, 1000);
                }
            }
        }

        function moveHandler(e) {
            if (!activeItem) return;
            e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            activeItem.style.position = 'fixed';
            activeItem.style.left = (t.clientX - 35) + 'px';
            activeItem.style.top = (t.clientY - 35) + 'px';
        }

        function endHandler(e) {
            if (!activeItem) return;
            const t = e.changedTouches ? e.changedTouches[0] : e;
            const dropEl = document.elementFromPoint(t.clientX, t.clientY);
            const zone = dropEl ? dropEl.closest('.drop-zone') : null;
            if (zone) handleDrop(activeItem.id, zone.id);
            activeItem.style.position = 'static';
            activeItem.style.pointerEvents = 'auto';
            activeItem = null;
        }

        document.querySelectorAll('.gem').forEach(g => {
            const start = (e) => {
                activeItem = g;
                g.style.pointerEvents = 'none';
                if(e.type === 'touchstart') e.preventDefault();
            };
            g.addEventListener('mousedown', start);
            g.addEventListener('touchstart', start, {passive: false});
        });

        document.addEventListener('mousemove', moveHandler);
        document.addEventListener('touchmove', moveHandler, {passive: false});
        document.addEventListener('mouseup', endHandler);
        document.addEventListener('touchend', endHandler, {passive: false});
    </script>
    <script src="archmage-logic.js"></script>
</body>
</html>
