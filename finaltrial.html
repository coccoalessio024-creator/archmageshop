<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Final Awakening</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'MedievalSharp', serif !important; touch-action: none; }
        body { background: #050505; color: #00fbff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* VIGNE DECORATIVE LATERALI */
        .vine-column {
            position: fixed; top: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: space-around; font-size: 2rem; z-index: 1; opacity: 0.6;
        }
        .v-left { left: 20px; }
        .v-right { right: 20px; }

        /* MANA BAR CELESTIALE */
        .divine-container { 
            width: 80%; max-width: 600px; height: 30px; border: 2px solid #00fbff; 
            margin: 30px 0; background: #000; box-shadow: 0 0 20px rgba(0, 251, 255, 0.3); 
        }
        #divine-fill { 
            width: 0%; height: 100%; background: linear-gradient(90deg, #fff, #00fbff); 
            box-shadow: 0 0 30px #fff; transition: width 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
        }

        /* ACTUAL MAGE AL CENTRO */
        .ritual-circle { position: relative; display: flex; justify-content: center; align-items: center; flex: 1; width: 100%; }
        
        #actual-mage {
            width: 350px; transition: 1s; filter: brightness(0.2) grayscale(1);
            z-index: 5; pointer-events: none;
        }
        /* Doppio Bagliore */
        .awakened { 
            filter: brightness(1.2) grayscale(0) !important; 
            drop-shadow: 0 0 40px #00fbff, 0 0 80px #d4af37 !important; 
            animation: pulseAwake 2s infinite alternate;
        }

        @keyframes pulseAwake {
            from { filter: brightness(1.1) drop-shadow(0 0 30px #00fbff); }
            to { filter: brightness(1.4) drop-shadow(0 0 60px #d4af37); }
        }

        /* GEMME E SLOT */
        .gem-altar { position: absolute; bottom: 50px; display: flex; gap: 30px; z-index: 10; }
        .gem { width: 70px; cursor: grab; transition: 0.3s; filter: drop-shadow(0 0 10px #fff); }
        
        .drop-zone {
            position: absolute; width: 120px; height: 120px;
            border: 2px dashed rgba(0, 251, 255, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        /* Posizioni attorno al mago */
        #zone-1 { top: 10%; left: 30%; }
        #zone-2 { top: 10%; right: 30%; }
        #zone-3 { bottom: 25%; left: 25%; }
        #zone-4 { bottom: 25%; right: 25%; }

        .target-slot { width: 90px; opacity: 0.4; transition: 0.5s; }
        .active-slot { opacity: 1; filter: drop-shadow(0 0 20px #00fbff); border: none !important; }

        /* LOGO FISSO */
        .final-logo { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; filter: drop-shadow(0 0 10px #d4af37); opacity: 0.8; }

        #ascension-msg {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; padding: 4rem; border: 5px solid #fff; text-align: center; z-index: 10000;
            box-shadow: 0 0 200px #00fbff;
        }
    </style>
</head>
<body>

    <!-- VIGNE -->
    <div class="vine-column v-left">🌿<br>🌿<br>🌿<br>🌿<br>🌿<br>🌿</div>
    <div class="vine-column v-right">🌿<br>🌿<br>🌿<br>🌿<br>🌿<br>🌿</div>

    <div class="divine-container"><div id="divine-fill"></div></div>

    <div class="ritual-circle">
        <img src="archives/actualmage.png" id="actual-mage" alt="The Archmage">

        <!-- Zone di rilascio -->
        <div class="drop-zone" id="zone-1"><img src="archives/coinslot.png" class="target-slot" id="t1"></div>
        <div class="drop-zone" id="zone-2"><img src="archives/coinslot.png" class="target-slot" id="t2"></div>
        <div class="drop-zone" id="zone-3"><img src="archives/coinslot.png" class="target-slot" id="t3"></div>
        <div class="drop-zone" id="zone-4"><img src="archives/coinslot.png" class="target-slot" id="t4"></div>
    </div>

    <div class="gem-altar">
        <img src="archives/coingem.png" id="g1" class="gem" draggable="true">
        <img src="archives/coingem.png" id="g2" class="gem" draggable="true">
        <img src="archives/coingem.png" id="g3" class="gem" draggable="true">
        <img src="archives/coingem.png" id="g4" class="gem" draggable="true">
    </div>

    <img src="archives/logo_archmage.png" class="final-logo" alt="Archmage Seal">

    <div id="ascension-msg">
        <h1 style="color:#fff; font-size: 3rem;">VOID-ASCENSION-000</h1>
        <p style="color:#00fbff;">You have unified the dual natures of the Archmage.</p>
        <a href="index.html" style="color:#d4af37; font-size: 1.5rem; text-decoration: none;">[ TRANSCEND ]</a>
    </div>

    <script>
        let solved = 0;
        let activeItem = null;

        // LOGICA UNIFICATA (PC & TOUCH)
        const gems = document.querySelectorAll('.gem');
        const mage = document.getElementById('actual-mage');

        function handleMatch(gemId, zoneId) {
            const zone = document.getElementById(zoneId);
            const targetImg = zone.querySelector('.target-slot');
            
            if (!targetImg.classList.contains('active-slot')) {
                targetImg.classList.add('active-slot');
                document.getElementById(gemId).style.visibility = 'hidden';
                solved++;
                document.getElementById('divine-fill').style.width = (solved * 25) + '%';
                
                if (solved >= 1) mage.style.filter = `brightness(${0.2 + (solved*0.25)}) grayscale(${1 - (solved*0.25)})`;

                if (solved === 4) {
                    mage.classList.add('awakened');
                    setTimeout(() => document.getElementById('ascension-msg').style.display = 'block', 1000);
                }
            }
        }

        // TOUCH ENGINE
        document.addEventListener('touchstart', e => {
            if (e.target.classList.contains('gem')) {
                activeItem = e.target;
                activeItem.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('touchmove', e => {
            if (activeItem) {
                const t = e.touches[0];
                activeItem.style.position = 'fixed';
                activeItem.style.left = (t.clientX - 35) + 'px';
                activeItem.style.top = (t.clientY - 35) + 'px';
            }
        });

        document.addEventListener('touchend', e => {
            if (activeItem) {
                const t = e.changedTouches[0];
                const dropEl = document.elementFromPoint(t.clientX, t.clientY);
                const zone = dropEl ? dropEl.closest('.drop-zone') : null;
                
                if (zone) handleMatch(activeItem.id, zone.id);
                
                activeItem.style.position = 'relative';
                activeItem.style.left = '0'; activeItem.style.top = '0';
                activeItem.style.pointerEvents = 'auto';
                activeItem = null;
            }
        });

        // MOUSE ENGINE
        draggables = document.querySelectorAll('.gem');
        draggables.forEach(g => {
            g.addEventListener('dragstart', e => e.dataTransfer.setData("text", e.target.id));
        });
        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', e => {
                const id = e.dataTransfer.getData("text");
                handleMatch(id, e.currentTarget.id);
            });
        });
    </script>
</body>
</html>
