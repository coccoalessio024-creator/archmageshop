<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Trial of the Ancients</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'MedievalSharp', serif !important; -webkit-user-drag: none; box-sizing: border-box; }
        
        body { 
            background: #0a0a0a; color: #f3e5ab; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
            overflow-y: auto; /* Permette lo scroll per raggiungere icone in basso */
        }

        /* HELP SYSTEM */
        .help-wrapper { position: fixed; top: 15px; left: 15px; z-index: 5000; }
        .help-btn {
            width: 45px; height: 45px; background: #d4af37; color: #140f0a;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.5rem; cursor: pointer; border: 2px solid #140f0a;
        }
        .help-scroll {
            position: absolute; top: 55px; left: 0; width: 250px;
            background: #fdf5e6 url('https://transparenttextures.com');
            border: 2px solid #8b4513; padding: 15px; color: #3d2b1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 5px;
            display: none; font-size: 0.85rem;
        }
        .help-wrapper:hover .help-scroll { display: block; }

        /* MANA BAR */
        .mana-container { 
            width: 85%; max-width: 600px; height: 25px; border: 2px solid #d4af37; 
            margin: 20px 0; background: #000; position: sticky; top: 10px; z-index: 1000;
        }
        #mana-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.4s; }

        /* GAME WORLD */
        .game-world { 
            display: flex; width: 100%; flex-direction: column; align-items: center; 
            padding: 20px; gap: 30px;
        }

        /* FIGURE BERSAGLIO */
        .main-stage { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .trio-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .target { width: 110px; text-align: center; filter: grayscale(1) brightness(0.3); transition: 0.4s; }
        .target img { width: 100%; height: auto; pointer-events: none; }
        .target.active { filter: grayscale(0) brightness(1.2); drop-shadow: 0 0 20px #00bfff; }
        .slot-target { width: 100px; border: 1px dashed #d4af37; padding: 10px; }

        /* ALTARI OGGETTI (Ora sotto o ai lati in base allo schermo) */
        .altar-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 40px; padding-bottom: 60px; }
        .fire-frame { 
            width: 85px; height: 85px; border: 2px solid #ff4500; 
            background: rgba(255, 69, 0, 0.1); display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 0 15px #ff4500;
        }

        .draggable { 
            width: 75px; height: 75px; object-fit: contain; 
            cursor: grab; touch-action: none; position: relative; z-index: 10;
        }

        #final-secret { 
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #000; padding: 3rem; 
            border: 4px solid #fff; text-align: center; z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="help-wrapper">
        <div class="help-btn">?</div>
        <div class="help-scroll">
            <b>GUIDE / GUIDA</b><br>
            Scroll down to find all items. Drag them to the masters above.<br>
            Scorri in basso per gli oggetti. Trascinali sui maestri in alto.
        </div>
    </div>

    <div class="mana-container"><div id="mana-fill"></div></div>

    <div class="game-world">
        <!-- BERSAGLI IN ALTO -->
        <div class="main-stage">
            <div class="trio-row">
                <div class="target" id="t-axeman"><img src="archives/axeman.png"><span>Axeman</span></div>
                <div class="target" id="t-knight"><img src="archives/knight.png"><span>Knight</span></div>
                <div class="target" id="t-mage"><img src="archives/actualmage.png"><span>Mage</span></div>
            </div>
            <div class="target slot-target" id="t-coinslot"><img src="archives/coinslot.png"><span>Slot</span></div>
        </div>

        <!-- OGGETTI IN BASSO (Scorri per vederli tutti) -->
        <div class="altar-container">
            <div class="fire-frame"><img src="archives/axe.png" id="axe" class="draggable"></div>
            <div class="fire-frame"><img src="archives/crown.png" id="crown" class="draggable"></div>
            <div class="fire-frame"><img src="archives/scroll.png" id="scroll" class="draggable"></div>
            <div class="fire-frame"><img src="archives/coingem.png" id="coingem" class="draggable"></div>
        </div>
    </div>

    <div id="final-secret">
        <h1 style="color:#00bfff;">HUNTER-MASTER 444</h1>
        <a href="index.html" style="color:#d4af37; text-decoration:none;">[ RETURN ]</a>
    </div>

    <script>
        let solved = 0;
        const map = { 'axe':'axeman', 'crown':'knight', 'scroll':'mage', 'coingem':'coinslot' };
        let activeItem = null;

        function checkMatch(itemId, targetId) {
            if (targetId === 't-' + map[itemId]) {
                const el = document.getElementById(targetId);
                if (!el.classList.contains('active')) {
                    el.classList.add('active');
                    document.getElementById(itemId).style.display = 'none';
                    solved++;
                    document.getElementById('mana-fill').style.width = (solved * 25) + '%';
                    if (solved === 4) document.getElementById('final-secret').style.display = 'block';
                    if (solved === 4) {
                        document.getElementById('final-secret').style.display = 'block';
                        localStorage.setItem('trial_1', 'true'); // ACCENDE LA GEMMA 1
                    }
                    return true;
                }
            }
            return false;
        }

        function onStart(e) {
            if (e.target.classList.contains('draggable')) {
                activeItem = e.target;
                activeItem.style.zIndex = "5000";
                activeItem.style.pointerEvents = 'none';
            }
        }

        function onMove(e) {
            if (!activeItem) return;
            // Impedisce lo scroll della pagina SOLO mentre trascini
            e.preventDefault();
            const point = e.touches ? e.touches[0] : e;
            activeItem.style.position = 'fixed';
            activeItem.style.left = (point.clientX - 37) + 'px';
            activeItem.style.top = (point.clientY - 37) + 'px';
        }

        function onEnd(e) {
            if (!activeItem) return;
            const point = e.changedTouches ? e.changedTouches[0] : e;
            const dropEl = document.elementFromPoint(point.clientX, point.clientY);
            const zone = dropEl ? dropEl.closest('.target') : null;
            
            if (zone && checkMatch(activeItem.id, zone.id)) {
                // Successo
            } else {
                activeItem.style.position = 'relative';
                activeItem.style.left = '0';
                activeItem.style.top = '0';
            }
            activeItem.style.pointerEvents = 'auto';
            activeItem = null;
        }

        // Listeners blindati
        document.addEventListener('mousedown', onStart);
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onEnd);
        document.addEventListener('touchstart', onStart, {passive: false});
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onEnd, {passive: false});
    </script>
    <script src="archmage-logic.js"></script>
</body>
</html>
