<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Trial of the Ancients</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { cursor: url('archives/potionmini.png'), auto !important; font-family: 'MedievalSharp', serif !important; -webkit-user-drag: none; }
        body { background: #0a0a0a; color: #f3e5ab; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; touch-action: none; }

        /* MANA BAR */
        .mana-container { width: 85%; max-width: 600px; height: 25px; border: 2px solid #d4af37; margin: 15px 0; background: #111; box-shadow: 0 0 15px rgba(0, 191, 255, 0.4); }
        #mana-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 20px #00bfff; transition: width 0.5s; }

        /* GAME WORLD */
        .game-world { display: flex; width: 100%; flex: 1; justify-content: space-around; align-items: center; padding: 10px; flex-wrap: wrap; }
        .altar { display: flex; flex-direction: column; gap: 20px; }
        
        .fire-frame { 
            width: 80px; height: 80px; border: 2px solid #ff4500; background: rgba(255, 69, 0, 0.1); 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #ff4500; 
            overflow: visible; position: relative; 
        }

        .draggable { 
            width: 70px; height: 70px; object-fit: contain; 
            touch-action: none; position: relative; z-index: 10;
            user-select: none; -webkit-user-select: none;
        }

        /* FIGURE BERSAGLIO */
        .main-stage { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .trio-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .target { width: 100px; text-align: center; filter: grayscale(1) brightness(0.3); transition: 0.4s; border: 1px solid rgba(212, 175, 55, 0.1); padding: 5px; }
        .target img { width: 100%; height: auto; pointer-events: none; }
        .target.active { filter: grayscale(0) brightness(1.3); border-color: #00bfff; box-shadow: 0 0 20px #00bfff; }
        
        .slot-target { width: 90px; filter: grayscale(1); border: 1px dashed #d4af37; }

        @media (max-width: 600px) {
            .game-world { flex-direction: column; }
            .altar { flex-direction: row; order: 2; margin-top: 20px; }
            .main-stage { order: 1; }
        }

        #final-secret { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; padding: 2rem; border: 4px solid #00bfff; text-align: center; z-index: 3000; box-shadow: 0 0 50px #00bfff; }
    </style>
</head>
<body>

    <div class="mana-container"><div id="mana-fill"></div></div>

    <div class="game-world">
        <div class="altar">
            <div class="fire-frame"><img src="archives/axe.png" id="axe" class="draggable"></div>
            <div class="fire-frame"><img src="archives/crown.png" id="crown" class="draggable"></div>
        </div>
        <div class="main-stage">
            <div class="trio-row">
                <div class="target" id="t-axeman"><img src="archives/axeman.png"><br><small>Axeman</small></div>
                <div class="target" id="t-knight"><img src="archives/knight.png"><br><small>Knight</small></div>
                <div class="target" id="t-mage"><img src="archives/actualmage.png"><br><small>Mage</small></div>
            </div>
            <div class="target slot-target" id="t-coinslot"><img src="archives/coinslot.png"><br><small>Slot</small></div>
        </div>
        <div class="altar">
            <div class="fire-frame"><img src="archives/scroll.png" id="scroll" class="draggable"></div>
            <div class="fire-frame"><img src="archives/coingem.png" id="coingem" class="draggable"></div>
        </div>
    </div>

    <div id="final-secret">
        <h1 style="color:#00bfff;">HUNTER-MASTER 444</h1>
        <p>Return to the Sanctum</p>
        <a href="index.html" style="color:#d4af37; text-decoration:none; font-weight:bold;">[ RETURN ]</a>
    </div>

    <script>
        let solved = 0;
        const targets = { 'axe':'axeman', 'crown':'knight', 'scroll':'mage', 'coingem':'coinslot' };
        let activeItem = null;

        // FUNZIONE UNIFICATA CONTROLLO VITTORIA
        function checkMatch(itemId, targetId) {
            const expectedTarget = 't-' + targets[itemId];
            if (targetId === expectedTarget) {
                const el = document.getElementById(targetId);
                if (!el.classList.contains('active')) {
                    el.classList.add('active');
                    document.getElementById(itemId).style.visibility = 'hidden';
                    solved++;
                    document.getElementById('mana-fill').style.width = (solved * 25) + '%';
                    if (solved === 4) document.getElementById('final-secret').style.display = 'block';
                }
            }
        }

        // --- GESTIONE TOUCH (DRAG MANUALE) ---
        document.addEventListener('touchstart', e => {
            if (e.target.classList.contains('draggable')) {
                activeItem = e.target;
                activeItem.style.zIndex = "1000";
                activeItem.style.pointerEvents = 'none'; // Importante per elementFromPoint
            }
        }, {passive: false});

        document.addEventListener('touchmove', e => {
            if (activeItem) {
                e.preventDefault();
                const touch = e.touches[0];
                activeItem.style.position = 'fixed';
                // Centra l'immagine sotto il dito (70px / 2 = 35)
                activeItem.style.left = (touch.clientX - 35) + 'px';
                activeItem.style.top = (touch.clientY - 35) + 'px';
            }
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if (activeItem) {
                const touch = e.changedTouches[0];
                // Trova cosa c'è sotto il dito al rilascio
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const closestTarget = targetEl ? targetEl.closest('.target') : null;
                
                if (closestTarget) {
                    checkMatch(activeItem.id, closestTarget.id);
                }
                
                // Reset
                activeItem.style.position = 'relative';
                activeItem.style.left = '0';
                activeItem.style.top = '0';
                activeItem.style.pointerEvents = 'auto';
                activeItem = null;
            }
        });

        // --- SUPPORTO DESKTOP (Mouse) ---
        // Disabilitiamo il drag nativo per usare la stessa logica del touch
        document.addEventListener('mousedown', e => {
            if (e.target.classList.contains('draggable')) {
                activeItem = e.target;
                activeItem.style.zIndex = "1000";
                activeItem.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('mousemove', e => {
            if (activeItem) {
                activeItem.style.position = 'fixed';
                activeItem.style.left = (e.clientX - 35) + 'px';
                activeItem.style.top = (e.clientY - 35) + 'px';
            }
        });

        document.addEventListener('mouseup', e => {
            if (activeItem) {
                const targetEl = document.elementFromPoint(e.clientX, e.clientY);
                const closestTarget = targetEl ? targetEl.closest('.target') : null;
                if (closestTarget) checkMatch(activeItem.id, closestTarget.id);
                
                activeItem.style.position = 'relative';
                activeItem.style.left = '0';
                activeItem.style.top = '0';
                activeItem.style.pointerEvents = 'auto';
                activeItem = null;
            }
        });
    </script>
</body>
</html>
