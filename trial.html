<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Trial of the Ancients</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { font-family: 'MedievalSharp', serif !important; touch-action: none; -webkit-user-drag: none; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f3e5ab; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* SISTEMA DI AIUTO (HELP) - Stile Index */
        .help-wrapper { position: fixed; top: 20px; left: 20px; z-index: 2500; }
        .help-btn {
            width: 45px; height: 45px; background: #d4af37; color: #140f0a;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.5rem; cursor: pointer; border: 2px solid #140f0a;
            box-shadow: 0 0 10px #d4af37;
        }
        .help-scroll {
            position: absolute; top: 55px; left: 0; width: 260px;
            background: #fdf5e6 url('https://transparenttextures.com');
            border: 2px solid #8b4513; padding: 15px; color: #3d2b1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 5px;
            opacity: 0; visibility: hidden; transition: 0.4s; font-size: 0.85rem; line-height: 1.4;
        }
        .help-wrapper:hover .help-scroll { opacity: 1; visibility: visible; transform: translateY(5px); }

        /* MANA BAR */
        .mana-container { 
            width: 80%; max-width: 600px; height: 30px; border: 2px solid #d4af37; 
            margin: 20px 0; background: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); z-index: 10;
        }
        #mana-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 20px #00bfff; transition: width 0.6s; }

        /* LAYOUT GIOCO */
        .game-world { display: flex; width: 100%; flex: 1; justify-content: space-around; align-items: center; padding: 10px; flex-wrap: wrap; }
        .altar { display: flex; flex-direction: column; gap: 20px; }
        .fire-frame { width: 90px; height: 90px; border: 2px solid #ff4500; background: rgba(255, 69, 0, 0.1); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #ff4500; overflow: hidden; }
        .draggable { width: 100%; height: 100%; object-fit: cover; transform: scale(1.3); cursor: grab; }

        .main-stage { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .trio-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .target { width: 120px; text-align: center; filter: grayscale(1) brightness(0.3); transition: 0.4s; }
        .target img { width: 100%; height: auto; transform: scale(1.2); }
        .target.active { filter: grayscale(0) brightness(1.2); drop-shadow: 0 0 20px #00bfff; }
        
        .slot-target { width: 100px; border: 1px dashed #d4af37; }

        @media (max-width: 600px) {
            .game-world { flex-direction: column; }
            .altar { flex-direction: row; order: 2; margin-top: 20px; }
            .main-stage { order: 1; }
        }

        #final-secret { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; padding: 2rem; border: 4px solid #00bfff; text-align: center; z-index: 3000; box-shadow: 0 0 50px #00bfff; }
    </style>
</head>
<body>

    <!-- HELP SYSTEM -->
    <div class="help-wrapper">
        <div class="help-btn">?</div>
        <div class="help-scroll">
            <b style="color:#7a1515">TRIAL GUIDE / GUIDA PROVA</b><br><br>
            [EN] Drag the artifacts to their matching masters. Fill the mana bar to reveal the secret.<br><br>
            [IT] Trascina gli artefatti sui rispettivi maestri. Riempi la barra mana per svelare il segreto.
        </div>
    </div>

    <div class="mana-container"><div id="mana-fill"></div></div>

    <div class="game-world">
        <div class="altar">
            <div class="fire-frame"><img src="archives/axe.png" id="axe" class="draggable"></div>
            <div class="fire-frame"><img src="archives/crown.png" id="crown" class="draggable"></div>
        </div>
        <div class="main-stage">
            <div class="trio-row">
                <div class="target" id="t-axeman"><img src="archives/axeman.png"><span>Axeman</span></div>
                <div class="target" id="t-knight"><img src="archives/knight.png"><span>Knight</span></div>
                <div class="target" id="t-mage"><img src="archives/actualmage.png"><span>Mage</span></div>
            </div>
            <div class="target slot-target" id="t-coinslot"><img src="archives/coinslot.png"><span>Slot</span></div>
        </div>
        <div class="altar">
            <div class="fire-frame"><img src="archives/scroll.png" id="scroll" class="draggable"></div>
            <div class="fire-frame"><img src="archives/coingem.png" id="coingem" class="draggable"></div>
        </div>
    </div>

    <div id="final-secret">
        <h1 style="color:#00bfff;">HUNTER-MASTER 444</h1>
        <a href="index.html" style="color:#d4af37; text-decoration:none; font-weight:bold;">[ RETURN ]</a>
    </div>

    <script>
        let solved = 0;
        const targets = { 'axe':'axeman', 'crown':'knight', 'scroll':'mage', 'coingem':'coinslot' };
        let activeItem = null;

        function checkMatch(itemId, targetId) {
            const expectedTarget = 't-' + targets[itemId];
            if (targetId === expectedTarget) {
                const el = document.getElementById(targetId);
                if (!el.classList.contains('active')) {
                    el.classList.add('active');
                    document.getElementById(itemId).style.visibility = 'hidden';
                    solved++;
                    document.getElementById('mana-fill').style.width = (solved * 25) + '%';
                    if (solved === 4) document.getElementById('final-secret').style.display = 'block';
                }
            }
        }

        const move = (x, y) => { if (activeItem) { activeItem.style.position = 'fixed'; activeItem.style.left = (x-40)+'px'; activeItem.style.top = (y-40)+'px'; } };
        const end = (x, y) => { if (activeItem) { activeItem.style.pointerEvents = 'none'; const d = document.elementFromPoint(x, y); const z = d ? d.closest('.target') : null; if (z) checkMatch(activeItem.id, z.id); activeItem.style.position = 'relative'; activeItem.style.left = '0'; activeItem.style.top = '0'; activeItem.style.pointerEvents = 'auto'; activeItem = null; } };

        document.addEventListener('mousedown', e => { if(e.target.classList.contains('draggable')) activeItem = e.target; });
        document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
        document.addEventListener('mouseup', e => end(e.clientX, e.clientY));
        document.addEventListener('touchstart', e => { if(e.target.classList.contains('draggable')) activeItem = e.target; });
        document.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchend', e => end(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
    </script>
</body>
</html>
