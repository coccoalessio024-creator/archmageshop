<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of the Ancients</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * { cursor: url('archives/potionmini.png'), auto !important; font-family: 'MedievalSharp', serif !important; }
        
        body { 
            background: #0a0a0a; color: #f3e5ab; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        .mana-container { 
            width: 90%; max-width: 800px; height: 35px; 
            border: 3px solid #d4af37; margin: 20px 0; 
            background: #111; box-shadow: 0 0 20px rgba(0, 191, 255, 0.4); 
        }
        #mana-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 25px #00bfff; transition: width 0.6s ease; }

        .game-world { 
            display: flex; width: 100%; flex: 1; 
            justify-content: space-around; align-items: center; 
            padding: 20px; box-sizing: border-box; flex-wrap: wrap;
        }
        
        .altar { display: flex; flex-direction: column; gap: 30px; justify-content: center; }
        
        /* ZOOM E CORNICI FUOCO */
        .fire-frame {
            width: 110px; height: 110px; border: 2px solid #ff4500;
            background: rgba(255, 69, 0, 0.1); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px #ff4500; overflow: hidden; /* Taglia i bordi inutili */
        }
        
        .draggable { 
            width: 100%; height: 100%; 
            object-fit: cover; /* Riempie il frame */
            transform: scale(1.3); /* ZOOM 90% centrale */
            transition: transform 0.2s; 
        }
        .draggable:hover { transform: scale(1.4); }

        .main-stage { display: flex; flex-direction: column; align-items: center; gap: 40px; margin: 20px; }
        .trio-row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        
        /* FIGURE CENTRALI CON ZOOM */
        .target { 
            width: 170px; height: 200px; text-align: center; 
            filter: grayscale(1) brightness(0.3); transition: 0.5s;
            overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .target img { 
            width: 100%; height: 80%; object-fit: cover; 
            transform: scale(1.2); /* ZOOM sulla figura */
        }
        .target.active { filter: grayscale(0) brightness(1.3); border-color: #00bfff; box-shadow: 0 0 30px #00bfff; }

        .slot-target { width: 150px; height: 150px; filter: grayscale(1); margin-top: 10px; overflow: hidden; border: 1px dashed #d4af37;}
        .slot-target img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.3); }
        .slot-target.active { filter: none; box-shadow: 0 0 25px #ffcc00; border-color: #ffcc00; }

        #final-secret { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.98); padding: 4rem; border: 4px solid #00bfff;
            text-align: center; z-index: 3000; box-shadow: 0 0 100px #00bfff;
        }

        @media (max-width: 800px) {
            .game-world { flex-direction: column; }
            .altar { flex-direction: row; order: 2; }
            .main-stage { order: 1; }
        }
    </style>
</head>
<body>

    <h1 style="color:#d4af37; text-shadow: 0 0 10px #000;">Trial of the Ancients</h1>

    <div class="mana-container">
        <div id="mana-fill"></div>
    </div>

    <div class="game-world">
        <div class="altar">
            <div class="fire-frame"><img src="archives/axe.png" id="axe" class="draggable" draggable="true" ondragstart="drag(event)"></div>
            <div class="fire-frame"><img src="archives/crown.png" id="crown" class="draggable" draggable="true" ondragstart="drag(event)"></div>
        </div>

        <div class="main-stage">
            <div class="trio-row">
                <div class="target" id="t-axeman" ondrop="drop(event, 'axe')" ondragover="allowDrop(event)">
                    <img src="archives/axeman.png"><span>The Axeman</span>
                </div>
                <div class="target" id="t-knight" ondrop="drop(event, 'crown')" ondragover="allowDrop(event)">
                    <img src="archives/knight.png"><span>The Knight</span>
                </div>
                <div class="target" id="t-mage" ondrop="drop(event, 'scroll')" ondragover="allowDrop(event)">
                    <img src="archives/actualmage.png"><span>The Mage</span>
                </div>
            </div>
            <div class="target slot-target" id="t-coinslot" ondrop="drop(event, 'coingem')" ondragover="allowDrop(event)">
                <img src="archives/coinslot.png"><span>Coin Slot</span>
            </div>
        </div>

        <div class="altar">
            <div class="fire-frame"><img src="archives/scroll.png" id="scroll" class="draggable" draggable="true" ondragstart="drag(event)"></div>
            <div class="fire-frame"><img src="archives/coingem.png" id="coingem" class="draggable" draggable="true" ondragstart="drag(event)"></div>
        </div>
    </div>

    <div id="final-secret">
        <h1 style="color:#00bfff; font-size: 3.5rem; margin:0;">HUNTER-MASTER 444</h1>
        <p style="font-size: 1.2rem;">"The arcane energies have been balanced."</p>
        <a href="index.html" style="color:#d4af37; text-decoration: underline; font-weight: bold;">Return to Sanctum</a>
    </div>

    <script>
        let solved = 0;
        function allowDrop(ev) { ev.preventDefault(); }
        
        function drag(ev) { 
            ev.dataTransfer.setData("text", ev.target.id);
            // Effetto fantasma durante il drag
            const img = new Image();
            img.src = ev.target.src;
            ev.dataTransfer.setDragImage(img, 40, 40);
        }

        function drop(ev, expectedId) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            if (data === expectedId) {
                const map = { 'axe':'axeman', 'crown':'knight', 'scroll':'mage', 'coingem':'coinslot' };
                const target = document.getElementById('t-' + map[data]);
                if (!target.classList.contains('active')) {
                    target.classList.add('active');
                    // Nasconde l'originale
                    document.getElementById(data).style.visibility = 'hidden';
                    solved++;
                    document.getElementById('mana-fill').style.width = (solved * 25) + '%';
                    if (solved === 4) setTimeout(() => document.getElementById('final-secret').style.display = 'block', 600);
                }
            }
        }
    </script>
</body>
</html>
